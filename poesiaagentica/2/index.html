<!DOCTYPE html>
<!-- corpus: canekzapata/poesiasexp | pieza 2 | CAMPO DE SIGNOS / FIELD OF SIGNS -->
<!-- forma: Tracery grammar + canvas particle system + alfabetos abstractos -->
<!-- caracteres: Disco de Festos, Sutom, Ogham, Buginese, Kayah Li, Box Drawing, Tibetano -->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAMPO DE SIGNOS / FIELD OF SIGNS</title>

  <style>
    @font-face {
      font-family: 'Symbola';
      src: url('https://raw.githubusercontent.com/canekzapata/poesiasexp/main/sutileza/css/Symbola.ttf') format('truetype');
      font-display: swap;
    }
    @font-face {
      font-family: 'Jomolhari';
      src: url('https://raw.githubusercontent.com/canekzapata/poesiasexp/main/sutileza/css/Jomolhari-xvVK.ttf') format('truetype');
      font-display: swap;
    }
    @font-face {
      font-family: 'VozMaquina';
      src: url('https://raw.githubusercontent.com/canekzapata/poesiasexp/main/lands/fonts/Px437_IBM_EGA_9x14.ttf') format('truetype');
      font-display: swap;
    }

    *, *::before, *::after { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    html, body {
      width: 100%; 
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: monospace;
    }

    /* — el cielo de signos — */
    #campo {
      position: fixed;
      top: 0; 
      left: 0;
      width: 100vw; 
      height: 100vh;
      display: block;
      background: #000;
      cursor: pointer;
    }

    #titulo {
      position: fixed;
      bottom: 2.2vh;
      left: 2.5vw;
      font-family: 'VozMaquina', monospace;
      font-size: clamp(7px, 0.9vw, 12px);
      color: rgba(0, 250, 102, 0.2);
      letter-spacing: 0.22em;
      z-index: 10;
      pointer-events: none;
    }

    #contador {
      position: fixed;
      bottom: 2.2vh;
      right: 2.5vw;
      font-family: 'VozMaquina', monospace;
      font-size: clamp(7px, 0.8vw, 10px);
      color: rgba(255, 180, 0, 0.15);
      letter-spacing: 0.18em;
      z-index: 10;
      pointer-events: none;
    }

    #status {
      position: fixed;
      top: 2vh;
      left: 2.5vw;
      font-family: 'VozMaquina', monospace;
      font-size: 10px;
      color: rgba(0, 255, 100, 0.4);
      z-index: 11;
      pointer-events: none;
      max-width: 300px;
      line-height: 1.2;
    }
  </style>
</head>
<body>

  <canvas id="campo"></canvas>

  <div id="titulo">CAMPO DE SIGNOS / FIELD OF SIGNS — POESIASEXP — II</div>
  <div id="contador">░░░░░</div>
  <div id="status">Cargando...</div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-1.11.2.min.js"></script>
  
  <!-- Tracery desde CDN -->
  <script src="https://cdn.jsdelivr.net/npm/tracery-grammar@2.7.7/tracery.js"></script>

  <!-- Tus scripts locales -->
  <script src="grammars.js"></script>
  <script src="app.js"></script>

  <script>
  // ═══════════════════════════════════════════════════════════════════
  // CAMPO DE SIGNOS — Sistema de Partículas Generativo
  // Integración con grammars.js y tracery
  // ═══════════════════════════════════════════════════════════════════

  const statusEl = document.getElementById('status');
  
  function log(msg) {
    console.log(msg);
    statusEl.textContent += '\n' + msg;
  }

  log('📍 Iniciando...');

  // ─────────────────────────────────────────────────────────────────
  // — el sistema de partículas —
  // ─────────────────────────────────────────────────────────────────

  const canvas  = document.getElementById('campo');
  const ctx     = canvas.getContext('2d', { alpha: true });
  
  if (!ctx) {
    log('❌ No se puede obtener contexto 2D del canvas');
    throw new Error('Canvas context failed');
  }

  let W = window.innerWidth;
  let H = window.innerHeight;
  let particulas = [];
  let frameN = 0;
  let isRunning = false;
  let grammar = null;

  // — paletas de color —
  const paletas = [
    { base: [0,   250, 102],  nombre: "verde"  },
    { base: [255, 180,   0],  nombre: "ambar"  },
    { base: [255, 255, 255],  nombre: "blanco" },
    { base: [255,  45, 120],  nombre: "rosa"   },
    { base: [0,   229, 255],  nombre: "cian"   },
    { base: [180,   0, 255],  nombre: "violeta"},
    { base: [255, 100,   0],  nombre: "naranja"},
  ];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function detectarFuente(glifo) {
    if (!glifo) return 'serif';
    const cp = glifo.codePointAt(0);
    if (cp >= 0x0F00 && cp <= 0x0FFF) return 'Jomolhari';
    if (cp >= 0x2500 && cp <= 0x257F) return 'VozMaquina';
    if (cp >= 0x1680 && cp <= 0x169C) return 'Symbola';
    return 'Symbola';
  }

  function crearParticula(glifo, indice, total) {
    const paleta  = paletas[Math.floor(Math.random() * paletas.length)];
    const tamano  = Math.random() * 54 + 18;
    const vida    = (Math.random() * 4 + 8) * 60;

    const x = Math.random() * W * 0.9 + W * 0.05;
    const y = Math.random() * H * 0.85 + H * 0.07;

    const angulo   = Math.random() * Math.PI * 2;
    const speed    = Math.random() * 0.3 + 0.05;
    const vx       = Math.cos(angulo) * speed;
    const vy       = Math.sin(angulo) * speed;

    const orbita   = (Math.random() - 0.5) * 0.003;

    return {
      glifo, x, y, vx, vy,
      tamano, paleta,
      vida, vidaMax: vida,
      fuente: detectarFuente(glifo),
      angulo: Math.random() * Math.PI * 2,
      orbita,
      fase: Math.random() * Math.PI * 2,
    };
  }

  function nuevaConstelacion() {
    if (!grammar) {
      log('❌ No hay gramática');
      return;
    }

    try {
      // Extraer solo los caracteres Unicode, ignorar HTML
      const frase  = grammar.flatten('#origin#');
      
      // Limpiar HTML tags y espacios
      const textoLimpio = frase.replace(/<[^>]*>/g, '').trim();
      
      // Convertir a array de caracteres unicode
      const glifos = Array.from(textoLimpio)
        .filter(g => g.trim() !== '' && g.length > 0)
        .slice(0, 30); // Limitar a 30 caracteres

      if (glifos.length === 0) {
        log('⚠️  Sin caracteres válidos');
        return;
      }

      const nuevas = glifos.map((g, i) => crearParticula(g, i, glifos.length));
      particulas = particulas.concat(nuevas);

      document.getElementById('contador').textContent = '░'.repeat(Math.min(glifos.length, 20));
      log(`✓ ${glifos.length} caracteres`);
    } catch(e) {
      log('❌ Error: ' + e.message);
    }
  }

  // — el loop principal —
  function loop() {
    if (!isRunning) return;
    
    frameN++;

    // Limpiar con desvanecimiento suave
    ctx.fillStyle = 'rgba(0, 0, 0, 0.045)';
    ctx.fillRect(0, 0, W, H);

    // Filtrar partículas vivas
    particulas = particulas.filter(p => p.vida > 0);

    for (const p of particulas) {
      p.vida--;
      p.x += p.vx;
      p.y += p.vy;
      p.angulo += p.orbita;

      // Oscilación suave
      p.x += Math.sin(p.fase + frameN * 0.008) * 0.12;
      p.y += Math.cos(p.fase + frameN * 0.006) * 0.10;

      // Calcular alpha con fade in/out
      const progreso = p.vida / p.vidaMax;
      let alpha;
      if (progreso > 0.85) {
        alpha = (1 - progreso) / 0.15;
      } else if (progreso < 0.2) {
        alpha = progreso / 0.2;
      } else {
        alpha = 1;
      }
      alpha = Math.max(0, Math.min(1, alpha));

      const [r, g, b] = p.paleta.base;

      ctx.save();
      ctx.shadowColor  = `rgba(${r},${g},${b},${alpha * 0.7})`;
      ctx.shadowBlur   = p.tamano * 0.6;
      ctx.fillStyle    = `rgba(${r},${g},${b},${alpha})`;
      ctx.font         = `bold ${p.tamano}px '${p.fuente}', Symbola, serif`;
      ctx.textBaseline = 'middle';
      ctx.textAlign    = 'center';

      ctx.translate(p.x, p.y);
      ctx.rotate(p.angulo * 0.15);
      ctx.fillText(p.glifo, 0, 0);
      ctx.restore();
    }

    requestAnimationFrame(loop);
  }

  // ─────────────────────────────────────────────────────────────────
  // — inicialización —
  // ─────────────────────────────────────────────────────────────────

  resize();
  window.addEventListener('resize', resize);

  // Esperar a que todo esté cargado
  const waitForDeps = setInterval(() => {
    // Verificar que tracery, grammars y jquery estén disponibles
    if (typeof tracery !== 'undefined' && typeof grammars !== 'undefined' && typeof $ !== 'undefined') {
      clearInterval(waitForDeps);
      log('✓ Todas las dependencias cargadas');
      
      try {
        // Crear la gramática desde grammars.js
        grammar = tracery.createGrammar(grammars.e);
        log('✓ Gramática de grammars.js creada');
        
        isRunning = true;
        log('✓ Sistema LISTO');
        
        // Generar primera constelación
        nuevaConstelacion();
        
        // Nueva constelación cada 3.5 segundos
        setInterval(nuevaConstelacion, 3500);
        
        // Click para constelación inmediata
        canvas.addEventListener('click', nuevaConstelacion);
        
        // Iniciar el loop de animación
        loop();
        
      } catch(e) {
        log('❌ Error: ' + e.message);
      }
    }
  }, 100);

  // Timeout de seguridad
  setTimeout(() => {
    if (!isRunning) {
      log('⏱️  TIMEOUT - Dependencias no cargaron');
    }
  }, 5000);

  </script>
</body>
</html>
