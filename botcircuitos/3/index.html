function pick(a) { return a[Math.random() * a.length | 0]; }
function rv(a, b) { return (Math.random() * (b - a) + a) | 0; }
function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
function fmt(v, d) { return v.toFixed(d); }

function glosaBlock(lines) {

// в”Җв”Җ RC PASO-BAJAS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
class RCLowpass {
  constructor() {
    this.R   = rv(10, 80);
    this.C   = rv(20, 150);
    this.tau = this.R * this.C / 1000;
    this.Vcc = rv(6, 15);
    this.Vc  = 0;
    this.t   = 0;
    this.name = 'FILTRO RC вҖ” PASO-BAJAS';
  }
  step(dt) {
    this.Vc += (this.Vcc - this.Vc) / this.tau * dt;
    this.t  += dt;
  }
  get displayV() { return this.Vc; }
  get vNorm()    { return clamp(this.Vc / this.Vcc, 0, 1); }
  diagram() {
    return [
      `  +${this.Vcc}V`,
      `   |`,
      `  in --[${this.R}kО©]------------------+---- Vout = ${fmt(this.Vc,3)}V`,
      `                               |`,
      `                            +--+--+`,
      `                            |  C  |  ${this.C}ВөF`,
      `                            +--+--+`,
      `                               |`,
      `                              GND`,
      ``,
      `  П„ = RC = ${fmt(this.tau,3)}s     t = ${fmt(this.t,3)}s`,
      `  V(t) = ${this.Vcc}В·(1 вҲ’ e^(вҲ’t/${fmt(this.tau,2)}))`,
    ].join('\n');
  }
  xfChar(ch, pos, len) {
    if (ch === ' ' || ch === '\n') return ch;
    const thr = pos / len;
    if (this.vNorm >= thr)         return ch;
    if (this.vNorm >= thr - 0.12)  return 'В·';
    return '_';
  }
  poem() {
    const p = Math.round(this.vNorm * 100);
    return p >= 99
      ? 'вҶ’ el filtro no detiene la seГұal вҖ” la recuerda mas despacio'
      : `вҶ’ cargando ${p}%   Vc = ${fmt(this.Vc,2)}V / ${this.Vcc}V`;
  }
  glosa() {
    return glosaBlock([
      'El paso-bajas no censura вҖ” pondera.',
      'Toda escucha es un filtro: la oreja humana',
      'es un RC mecГЎnico-neumГЎtico centrado cerca de 3 kHz.',
      'Pauline Oliveros lo llamГі deep listening.',
      'вҶ’ el filtro no detiene la seГұal, la recuerda mГЎs despacio.',
    ]);
  }
}

// в”Җв”Җ RLC RESONADOR в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
class RLCResonator {
  constructor() {
    this.f0    = +(Math.random() * 1.6 + 0.2).toFixed(3);
    this.Q     = +(Math.random() * 6   + 1.2).toFixed(2);
    this.Vcc   = rv(5, 12);
    this.w0    = 2 * Math.PI * this.f0;
    this.alpha = this.w0 / (2 * this.Q);
    this.Rd = rv(5, 80);
    this.Ld = rv(50, 400);
    this.Cd = rv(50, 470);
    this.Vc  = 0;
    this.dVc = 0;
    this.t   = 0;
    this.name = 'RESONADOR RLC вҖ” AMORTIGUADO';
  }
  step(dt) {
    const d2 = this.w0 * this.w0 * (this.Vcc - this.Vc) - 2 * this.alpha * this.dVc;
    this.dVc += d2 * dt;
    this.Vc  += this.dVc * dt;
    this.t   += dt;
  }
  get displayV() { return clamp(this.Vc, 0, this.Vcc * 1.6); }
  get vNorm()    { return clamp(this.Vc / this.Vcc, -1.2, 1.2); }
  diagram() {
    return [
      `  +${this.Vcc}V --[${this.Rd}О©]--[${this.Ld}mH]--[${this.Cd}ВөF]-- GND`,
      `                                    Vc = ${fmt(this.Vc,3)}V`,
      ``,
      `  fвӮҖ = ${fmt(this.f0,3)} Hz`,
      `  Q  = ${fmt(this.Q,2)}`,
      `  Оұ  = ${fmt(this.alpha,3)} Np/s`,
      `  t  = ${fmt(this.t,3)}s`,
    ].join('\n');
  }
  xfChar(ch, pos, len) {
    if (ch === ' ' || ch === '\n') return ch;
    const phi = (pos / len) * 2 * Math.PI;
    const env = Math.exp(-this.alpha * this.t);
    const v   = Math.sin(this.w0 * this.t + phi) * env;
    if (v >  0.5) return ch.toUpperCase();
    if (v >  0.1) return ch;
    if (v > -0.1) return 'В·';
    if (v > -0.5) return ch.toLowerCase();
    return '_';
  }
  poem() {
    return `вҲ… oscilando a ${fmt(this.f0,2)}Hz  Q=${fmt(this.Q,2)}  Vc=${fmt(this.Vc,2)}V`;
  }
  glosa() {
    return glosaBlock([
      'En fвӮҖ inductiva y capacitiva se anulan: el sistema',
      'deja de oponerse a la seГұal y se convierte en ella.',
      'Xenakis: la mГәsica como nubes que condensan en resonancias.',
      'Cada cuerpo tiene su fвӮҖ вҖ” la Tierra misma a 7.83 Hz (Schumann).',
      'вҲ… en la resonancia todo coincide вҖ” fвӮҖ no se busca, se encuentra.',
    ]);
  }
}

// в”Җв”Җ 555 ASTABLE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
class Astable555 {
  constructor() {
    this.Ra  = rv(10, 80);
    this.Rb  = rv(10, 80);
    this.C   = rv(10, 100);
    this.Vcc = pick([5, 9, 12]);
    this.f   = 1000 / (0.693 * (this.Ra + 2 * this.Rb) * this.C);
    this.T   = 1 / this.f;
    this.D   = (this.Ra + this.Rb) / (this.Ra + 2 * this.Rb);
    this.t   = 0;
    this.name = 'OSCILADOR ASTABLE вҖ” NE555';
  }
  step(dt) { this.t += dt; }
  get high()     { return (this.t % this.T) / this.T < this.D; }
  get displayV() { return this.high ? this.Vcc * 0.667 : this.Vcc * 0.333; }
  get vNorm()    { return this.high ? 1 : 0; }
  diagram() {
    const state = this.high
      ? `HIGH  ${fmt(this.Vcc*0.667,1)}V`
      : `LOW   ${fmt(this.Vcc*0.333,1)}V`;
    return [
      `  +${this.Vcc}V --[Ra=${this.Ra}kО©]--[Rb=${this.Rb}kО©]--[C=${this.C}ВөF]-- GND`,
      ``,
      `  f    = ${fmt(this.f,3)} Hz`,
      `  T    = ${fmt(this.T*1000,1)} ms`,
      `  D    = ${fmt(this.D*100,1)}%   Th=${fmt(this.D*this.T*1000,1)}ms  Tl=${fmt((1-this.D)*this.T*1000,1)}ms`,
      `  OUT  = ${state}`,
      `  t    = ${fmt(this.t,3)}s`,
    ].join('\n');
  }
  xfChar(ch, pos, len) {
    if (ch === ' ' || ch === '\n') return ch;
    return this.high ? ch.toUpperCase() : ch.toLowerCase();
  }
  poem() {
    return `в–  ${this.high ? 'HIGH' : 'low '} вҖ” el oscilador no pregunta por que вҖ” solo pulsa`;
  }
  glosa() {
    return glosaBlock([
      'Hans Camenzind, 1972 вҖ” diseГұГі un chip que sГіlo sabГӯa pulsar.',
      'El 555 no tiene memoria larga: olvida en cada periodo.',
      'Bergson distinguГӯa chronos (medido) de durГ©e (vivido):',
      'el astable es la mГЎquina mГЎs anti-bergsoniana posible.',
      'в–  no pregunta por quГ© вҖ” sГіlo pulsa, siempre pulsa.',
    ]);
  }
}

// в”Җв”Җ RC PASO-ALTAS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
class RCHighpass {
  constructor() {
    this.R   = rv(10, 80);
    this.C   = rv(5, 50);
    this.tau = this.R * this.C / 1000;
    this.Vcc = rv(5, 12);
    this.Vc  = 0;
    this.t   = 0;
    this.name = 'FILTRO RC вҖ” PASO-ALTAS';
  }
  step(dt) {
    this.Vc += (this.Vcc - this.Vc) / this.tau * dt;
    this.t  += dt;
  }
  get Vout()     { return clamp(this.Vcc - this.Vc, 0, this.Vcc); }
  get displayV() { return this.Vout; }
  get vNorm()    { return clamp(this.Vout / this.Vcc, 0, 1); }
  diagram() {
    return [
      `  in --[${this.C}ВөF]--+--[${this.R}kО©]-- GND`,
      `                  |`,
      `                 Vout = ${fmt(this.Vout,3)}V`,
      ``,
      `  П„    = ${fmt(this.tau,3)}s`,
      `  V(t) = ${this.Vcc}В·e^(вҲ’t/${fmt(this.tau,2)})`,
      `  t    = ${fmt(this.t,3)}s`,
    ].join('\n');
  }
  xfChar(ch, pos, len) {
    if (ch === ' ' || ch === '\n') return ch;
    const bucket = (this.t * 5) | 0;
    const h = ((pos * 7919 + bucket * 6271) % 97) / 97;
    if (h < this.vNorm) return ch;
    return this.vNorm > 0.25 ? 'В·' : '_';
  }
  poem() {
    const p = Math.round(this.vNorm * 100);
    return `вҠҘ solo el principio es visible вҖ” ${p}% de seГұal restante`;
  }
  glosa() {
    return glosaBlock([
      'El paso-altas no recuerda вҖ” reacciona.',
      'SГіlo el cambio le interesa; lo estable lo invisibiliza.',
      'Whitehead: la realidad es prensiГіn del instante presente.',
      'Cuando todo se estabiliza, el paso-altas dice: no hay noticia.',
      'вҠҘ sГіlo el principio es visible вҖ” el rГ©gimen permanente se desvanece.',
    ]);
  }
}

// в”Җв”Җ INTEGRADOR OP-AMP в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
class IntegradorOpAmp {
  constructor() {
    this.R = rv(10, 80);
    this.C = rv(10, 100);
    this.RC = this.R * this.C / 1000000;
    this.Vin = +(Math.random() * 0.4 + 0.15).toFixed(3);
    this.Vsat = rv(5, 12);
    this.Vout = 0;
    this.t = 0;
    this.name = 'INTEGRADOR вҖ” OP-AMP';
  }
  step(dt) {
    if (this.Vout < this.Vsat) {
      this.Vout += (this.Vin / this.RC) * dt;
    }
    this.t += dt;
  }
  get displayV() { return this.Vout; }
  get vNorm()    { return clamp(this.Vout / this.Vsat, 0, 1); }
  diagram() {
    return [
      `                 C = ${this.C}nF`,
      `         +--[ === ]--+`,
      `         |           |`,
      `  in --[${this.R}kО©]----+--(вҲ’)         |`,
      `                    [  A  ]+-- Vout = ${fmt(this.Vout,3)}V`,
      `                   GND  (+)`,
      ``,
      `  RC    = ${fmt(this.RC*1000,3)} ms`,
      `  Vin   = ${fmt(this.Vin,3)} V  (escalГіn DC)`,
      `  Vout  = Vin/RC В· t  (saturaciГіn = Вұ${this.Vsat}V)`,
      `  t     = ${fmt(this.t,3)} s`,
    ].join('\n');
  }
  xfChar(ch, pos, len) {
    if (ch === ' ' || ch === '\n') return ch;
    const thr = pos / len;
    if (this.vNorm >= thr) return ch;
    if (this.vNorm >= thr - 0.15) return 'В·';
    return '_';
  }
  poem() {
    return `вҲ« acumulando ${Math.round(this.vNorm*100)}%  Vout = ${fmt(this.Vout,2)}V вҖ” todo presente es la integral del pasado`;
  }
  glosa() {
    return glosaBlock([
      'El integrador no responde вҖ” acumula.',
      'A cada presente le suma todo el pasado, dividido por RC.',
      'Stiegler: tertiary retention, tГ©cnica como memoria exteriorizada.',
      'Whitehead: la realidad es prensiГіn de ocasiones anteriores.',
      'вҲ« olvidar es resetear C a tierra вҖ” la huella iГіnica permanece.',
    ]);
  }
}

// в”Җв”Җ SCHMITT TRIGGER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
class SchmittBistable {
  constructor() {
    this.Vcc = pick([5, 9, 12]);
    this.R1 = rv(10, 50);
    this.R2 = rv(20, 80);
    this.Vh = this.Vcc * this.R1 / (this.R1 + this.R2);
    this.Vl = -this.Vh;
    this.freq = +(Math.random() * 0.4 + 0.2).toFixed(2);
    this.t = 0;
    this.Vin = 0;
    this.Vout = this.Vcc;
    this.name = 'SCHMITT TRIGGER вҖ” BIESTABLE';
  }
  step(dt) {
    this.t += dt;
    this.Vin = this.Vcc * 1.3 * Math.sin(2 * Math.PI * this.freq * this.t);
    if (this.Vout > 0 && this.Vin < this.Vl) this.Vout = -this.Vcc;
    if (this.Vout < 0 && this.Vin > this.Vh) this.Vout = +this.Vcc;
  }
  get displayV() { return Math.max(this.Vout, 0); }
  get vNorm()    { return this.Vout > 0 ? 1 : 0; }
  diagram() {
    return [
      `                          +Vcc=${this.Vcc}V`,
      `                              |`,
      `  Vin в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ(вҲ’)`,
      `                         в”Ңв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”җ`,
      `                         в”Ӯ    A    в”ңв”Җв”Җв”Җв”Җ Vout = ${fmt(this.Vout,2)} V`,
      `  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ(+)        в”Ӯ`,
      `  в”Ӯ                       в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ`,
      `  в”ңв”Җв”Җ[R1=${this.R1}kО©]в”Җв”Җ GND`,
      `  в”Ӯ`,
      `  в””в”Җв”Җ[R2=${this.R2}kО©]в”Җв”Җ realimentaciГіn`,
      ``,
      `  V_H = +${fmt(this.Vh,2)} V    V_L = ${fmt(this.Vl,2)} V`,
      `  Vin = ${fmt(this.Vin,2)} V    estado = ${this.Vout>0?'HIGH':'LOW'}`,
    ].join('\n');
  }
  xfChar(ch, pos, len) {
    if (ch === ' ' || ch === '\n') return ch;
    if (this.Vout > 0) return ch;
    return 'В·';
  }
  poem() {
    return `в–І ${this.Vout>0?'HIGH':'LOW '}  Vin=${fmt(this.Vin,2)}V вҖ” la duda tambien es memoria`;
  }
  glosa() {
    return glosaBlock([
      'Otto H. Schmitt, 1934 вҖ” estudiando el axГіn del calamar',
      'notГі que la membrana usaba histГ©resis para no disparar dos veces.',
      'Una cosa para entrar, otra para salir.',
      'Luhmann llamarГӯa a la banda muerta "indiferencia operativa".',
      'в–І entre V_L y V_H habita la duda вҖ” y la duda tambiГ©n es memoria.',
    ]);
  }
}

// в”Җв”Җ MODULADOR AM в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
class ModuladorAM {
  constructor() {
    this.fc = +(Math.random() * 0.5 + 0.8).toFixed(2);
    this.fm = +(Math.random() * 0.25 + 0.1).toFixed(3);
    this.m  = +(Math.random() * 0.6 + 0.3).toFixed(2);
    this.Vcc = rv(5, 12);
    this.t = 0;
    this.name = 'MODULADOR AM вҖ” PORTADORA Г— MENSAJE';
  }
  step(dt) { this.t += dt; }
  envelope(phi) { return 1 + this.m * Math.cos(2*Math.PI*this.fm*this.t + phi); }
  carrier()     { return Math.cos(2*Math.PI*this.fc*this.t); }
  get displayV() {
    const v = this.envelope(0) * (this.carrier() + 1) / 2;
    return clamp(v * this.Vcc / 2, 0, this.Vcc);
  }
  get vNorm() {
    return clamp(this.envelope(0) * (this.carrier()+1)/2 / 2, 0, 1);
  }
  diagram() {
    return [
      `   Ој(t) в”Җв”Җв”җ`,
      `          в–ј`,
      `       в”Ңв”Җв”Җв”Җв”Җв”Җв”җ`,
      `       в”Ӯ  Г—  в”ңв”Җв”Җ s(t) = [1 + mВ·Ој(t)] В· cos(2ПҖВ·fcВ·t)`,
      `       в””в”Җв”Җв”Җв”Җв”Җв”ҳ`,
      `          в–І`,
      `   cos(2ПҖВ·fcВ·t) в”Җв”Җв”ҳ`,
      ``,
      `  fc = ${this.fc} Hz       fm = ${this.fm} Hz`,
      `  m  = ${this.m}           BW = 2В·fm`,
      `  envelope(t) = ${fmt(this.envelope(0),3)}`,
      `  carrier(t)  = ${fmt(this.carrier(),3)}`,
    ].join('\n');
  }
  xfChar(ch, pos, len) {
    if (ch === ' ' || ch === '\n') return ch;
    const phi = (pos / len) * 2 * Math.PI * 0.5;
    const env = this.envelope(phi);
    const car = Math.cos(2*Math.PI*this.fc*this.t + phi);
    const v = env * (car + 1) / 2;
    if (v > 1.2) return ch.toUpperCase();
    if (v > 0.55) return ch;
    if (v > 0.2) return 'В·';
    return '_';
  }
  poem() {
    return `Г— env=${fmt(this.envelope(0),2)}  carrier=${fmt(this.carrier(),2)}  m=${this.m}`;
  }
  glosa() {
    return glosaBlock([
      'Fessenden, Nochebuena 1906: una voz humana sobre una onda hertziana,',
      'por primera vez. El mensaje no se transmite: cabalga.',
      'El Гӯndice m mide cuГЎnto te dejГЎs afectar por lo que llevГЎs.',
      'Shannon, 1948: la informaciГіn es la sorpresa del sГӯmbolo.',
      'Г— hablar es modular вҖ” imprimirle al silencio una envolvente.',
    ]);
  }
}

// в”Җв”Җ RECTIFICADOR PUENTE + FILTRO C в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
class RectificadorPuente {
  constructor() {
    this.Vac = rv(6, 18);
    this.f   = +(Math.random() * 0.5 + 0.3).toFixed(2);
    this.C   = rv(100, 2200);
    this.t   = 0;
    this.Vc  = 0;
    this.Vin = 0;
    this.name = 'RECTIFICADOR PUENTE + FILTRO C';
  }
  step(dt) {
    this.t += dt;
    this.Vin = Math.abs(Math.sin(2*Math.PI*this.f*this.t)) * this.Vac - 1.4;
    if (this.Vin > this.Vc) this.Vc = this.Vin;
    else this.Vc -= 0.4 * dt;
    this.Vc = Math.max(0, this.Vc);
  }
  get displayV() { return this.Vc; }
  get vNorm()    { return clamp(this.Vc / this.Vac, 0, 1); }
  diagram() {
    return [
      `      AC ~ ${this.Vac}V  @ ${this.f}Hz`,
      `           |`,
      `      в”Ңв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”җ`,
      `      в–јD1     в–ІD2`,
      `      в”ңв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Өв”Җв”Җв”Җв”Җв”Җв”Җ +Vdc`,
      `      в–ІD4 в”Ӯ   в–јD3`,
      `      в””в”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”ҳ`,
      `           |      в”Ңв”Җв”Җв”Җв”Җв”Җв”җ`,
      `           в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Ө C=${this.C}ВөF`,
      `          GND     в””в”Җв”Җв”¬в”Җв”Җв”ҳ`,
      `                     GND`,
      ``,
      `  Vin    = ${fmt(this.Vin,2)} V  (pulsante)`,
      `  Vc     = ${fmt(this.Vc,2)} V  (DC suavizada)`,
      `  fripple= ${fmt(2*this.f,2)} Hz`,
    ].join('\n');
  }
  xfChar(ch, pos, len) {
    if (ch === ' ' || ch === '\n') return ch;
    const phi = (pos / len) * Math.PI * 2;
    const v = Math.abs(Math.sin(2*Math.PI*this.f*this.t + phi));
    if (v > 0.7) return ch.toUpperCase();
    if (v > 0.4) return ch;
    if (v > 0.15) return 'В·';
    return '_';
  }
  poem() {
    return `вҠ• rectificado вҖ” la onda sigue debajo a ${fmt(2*this.f,2)}Hz`;
  }
  glosa() {
    return glosaBlock([
      'Cuatro diodos: cuatro decisiones sin sujeto.',
      'Rectificar вҖ”del latГӯn rectus, rectoвҖ” no es enderezar la verdad,',
      'es enderezar la fuerza. El capacitor rellena el valle con su memoria.',
      'Flusser: el aparato reescribe el cГіdigo alterno en cГіdigo lineal.',
      'вҠ• toda fuente continua es un mito Гәtil вҖ” la onda sigue debajo.',
    ]);
  }
}

// в”Җв”Җ ESPEJO DE CORRIENTE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
class EspejoCorriente {
  constructor() {
    this.Vcc = pick([5, 9, 12]);
    this.Rref = rv(2, 47);
    this.Iref = (this.Vcc - 0.7) / this.Rref;
    this.beta = rv(60, 400);
    this.err  = 2 / this.beta;
    this.Iout = this.Iref * (1 - this.err);
    this.t = 0;
    this.name = 'ESPEJO DE CORRIENTE вҖ” PAR NPN';
  }
  step(dt) { this.t += dt; }
  get displayV() { return this.Iout; }
  get vNorm()    { return clamp(this.Iout / this.Iref, 0, 1); }
  diagram() {
    return [
      `          +Vcc=${this.Vcc}V`,
      `              |`,
      `          [Rref=${this.Rref}kО©]              [carga]`,
      `              |                                |`,
      `              в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ  |`,
      `              в”Ӯ      в”Ӯ                      в”Ӯ  |`,
      `            [Q1]   в”Җв”Җв”Ө                    [Q2]в”Җв”ҳ`,
      `              в”Ӯ      в”Ӯ                      в”Ӯ`,
      `              в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җ GND`,
      ``,
      `  Iref = ${fmt(this.Iref,3)} mA`,
      `  Iout = ${fmt(this.Iout,3)} mA   (error 2/ОІ = ${fmt(this.err*100,2)}%)`,
      `  ОІ    = ${this.beta}`,
    ].join('\n');
  }
  xfChar(ch, pos, len) {
    if (ch === ' ' || ch === '\n') return ch;
    const bucket = (this.t * 2) | 0;
    const h = ((pos * 4567 + bucket * 9173) % 1000) / 1000;
    if (h < this.err * 8) return 'В·';
    return ch;
  }
  poem() {
    return `вҠҘ espejo activo  Iout/Iref = ${fmt(this.Iout/this.Iref,4)}  estilo = offset`;
  }
  glosa() {
    return glosaBlock([
      'Q1 mira a Q2 y dice: serГЎs como yo.',
      'No es copia exacta вҖ” el error 2/ОІ es la firma del original.',
      'Benjamin: la copia pierde aura pero gana circulaciГіn;',
      'el espejo electrГіnico hace eso miles de veces por chip.',
      'вҠҘ la pequeГұa desviaciГіn sistemГЎtica es lo que llamamos estilo.',
    ]);
  }
}

// в”Җв”Җ PLL вҖ” PHASE-LOCKED LOOP в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
class PLLEnganche {
  constructor() {
    this.fref = +(Math.random() * 0.3 + 0.2).toFixed(2);
    this.N = rv(2, 16);
    this.fvco = +(this.fref * this.N).toFixed(2);
    this.phaseErr = Math.PI;
    this.tauLock = +(Math.random() * 3 + 2.5).toFixed(2);
    this.t = 0;
    this.name = 'PLL вҖ” PHASE-LOCKED LOOP';
  }
  step(dt) {
    this.t += dt;
    this.phaseErr *= Math.exp(-dt / this.tauLock);
  }
  get locked() { return Math.abs(this.phaseErr) < 0.12; }
  get displayV() { return (1 - Math.abs(this.phaseErr) / Math.PI) * 10; }
  get vNorm()    { return clamp(1 - Math.abs(this.phaseErr) / Math.PI, 0, 1); }
  diagram() {
    return [
      `   ref(${this.fref}Hz) в”Җв”Җв”җ`,
      `                       в”Ӯ   в”Ңв”Җв”Җв”Җв”Җв”Җв”җ   в”Ңв”Җв”Җв”Җв”Җв”Җв”җ   в”Ңв”Җв”Җв”Җв”Җв”Җв”җ`,
      `                       в”ңв”Җв”Җв–¶в”Ӯ PFD в”Ӯв”Җв”Җв–¶в”Ӯ LPF в”Ӯв”Җв”Җв–¶в”Ӯ VCO в”Ӯв”Җв”Җв”¬в”Җв”Җ ${this.fvco}Hz`,
      `                       в”Ӯ   в””в”Җв”Җв”Җв”Җв”Җв”ҳ   в””в”Җв”Җв”Җв”Җв”Җв”ҳ   в””в”Җв”Җв”Җв”Җв”Җв”ҳ  в”Ӯ`,
      `                       в”Ӯ                                в”Ӯ`,
      `                       в”Ӯ           в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ           в”Ӯ`,
      `                       в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө Г· N=${this.N}  в—Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ`,
      `                                   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ`,
      ``,
      `  О”ПҶ   = ${fmt(this.phaseErr,3)} rad`,
      `  П„    = ${this.tauLock} s     t = ${fmt(this.t,3)} s`,
      `  ESTADO: ${this.locked ? 'ENGANCHADO' : 'BUSCANDO...'}`,
    ].join('\n');
  }
  xfChar(ch, pos, len) {
    if (ch === ' ' || ch === '\n') return ch;
    if (this.locked) return ch;
    const noise = Math.abs(this.phaseErr) / Math.PI;
    const bucket = (this.t * 4) | 0;
    const h = ((pos * 7919 + bucket * 6271) % 1000) / 1000;
    if (h > noise) return ch;
    if (h > noise - 0.18) return 'В·';
    return '_';
  }
  poem() {
    return `вҠ• ${this.locked?'ENGANCHADO':'fase О”ПҶ='+fmt(this.phaseErr,2)+'rad'} вҖ” antes del mensaje, la fase`;
  }
  glosa() {
    return glosaBlock([
      'Huygens, La Haya 1665: dos pГ©ndulos en la misma viga',
      'sincronizГЎndose solos. Sympathie des horloges.',
      'SincronГӯa no es identidad вҖ” es diferencia constante, fase fija.',
      'Stiegler: toda comunidad tГ©cnica es sincronizaciГіn de retenciones.',
      'вҠ• antes del mensaje, la fase. Antes de la fase, el querer.',
    ]);
  }
}

// в”Җв”Җ ONDA ESTACIONARIA вҖ” LГҚNEA DE TRANSMISIГ“N в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
class OndaEstacionaria {
  constructor() {
    this.Z0 = pick([50, 75, 300, 600]);
    this.ZL = rv(20, 1200);
    this.G  = (this.ZL - this.Z0) / (this.ZL + this.Z0);
    this.VSWR = (1 + Math.abs(this.G)) / (1 - Math.abs(this.G));
    this.f   = +(Math.random() * 0.4 + 0.2).toFixed(2);
    this.t   = 0;
    this.name = 'ONDA ESTACIONARIA вҖ” LГҚNEA DESADAPTADA';
  }
  step(dt) { this.t += dt; }
  envelope(x) {
    const beta = 2 * Math.PI * 1.5;
    const re = 1 + this.G * Math.cos(2 * beta * x);
    const im = this.G * Math.sin(2 * beta * x);
    return Math.sqrt(re*re + im*im);
  }
  get displayV() { return this.envelope(0.5) * 5; }
  get vNorm()    { return clamp(this.envelope(0.5) / 2, 0, 1); }
  diagram() {
    return [
      `  fuente в”Җв”Җ[ZвӮҖ=${this.Z0}О©]в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ[ZL=${this.ZL}О©]`,
      ``,
      `   |вҲҝвҲҝвҲҝ|     |вҲҝвҲҝвҲҝ|     |вҲҝвҲҝвҲҝ|     |вҲҝвҲҝвҲҝ|`,
      `   в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–¶ x`,
      `   0       О»/4       О»/2       3О»/4       О»`,
      ``,
      `  О“    = ${fmt(this.G,3)}`,
      `  VSWR = ${fmt(this.VSWR,2)}`,
      `  estado: ${Math.abs(this.G)<0.1?'adaptada вҖ” sin eco':'desadaptada вҖ” eco hacia la fuente'}`,
    ].join('\n');
  }
  xfChar(ch, pos, len) {
    if (ch === ' ' || ch === '\n') return ch;
    const x = pos / Math.max(len-1, 1);
    const v = this.envelope(x);
    const tmod = 0.5 + 0.5 * Math.cos(2*Math.PI*this.f*this.t);
    const final = v * tmod;
    if (final > 1.1) return ch.toUpperCase();
    if (final > 0.55) return ch;
    if (final > 0.25) return 'В·';
    return '_';
  }
  poem() {
    return `вҠ• VSWR=${fmt(this.VSWR,2)} вҖ” adaptar es hacerse del tamano de quien escucha`;
  }
  glosa() {
    return glosaBlock([
      'Una lГӯnea desadaptada devuelve parte de la seГұal a quien la emitiГі:',
      'reflexiГіn en fГӯsica, eco en acГәstica, malentendido en literatura.',
      'Kittler: los medios son canales con impedancia.',
      'Entre dos personas que no terminan en ZвӮҖ vibra una onda estacionaria.',
      'вҠ• adaptar la impedancia es un acto amoroso: del tamaГұo del otro.',
    ]);
  }
}

// в”Җв”Җ BUCK CONVERTER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
class BuckConverter {
  constructor() {
    this.Vin = pick([12, 24, 48]);
    this.D   = +(Math.random() * 0.6 + 0.2).toFixed(2);
    this.fsw = +(Math.random() * 0.8 + 0.6).toFixed(2);
    this.Vout = +(this.Vin * this.D).toFixed(2);
    this.L = rv(10, 470);
    this.C = rv(10, 470);
    this.t = 0;
    this.name = 'BUCK CONVERTER вҖ” DC-DC REDUCTOR';
  }
  step(dt) { this.t += dt; }
  get switchOn() { return ((this.t * this.fsw) % 1) < this.D; }
  get displayV() { return this.switchOn ? this.Vin : 0; }
  get vNorm()    { return this.D; }
  diagram() {
    return [
      `  Vin=${this.Vin}V в”Җв”Җ[ SW ]в”Җв”Җв”¬в”Җв”Җв”Җ[L=${this.L}ВөH]в”Җв”Җв”Җв”¬в”Җв”Җ Vout=${this.Vout}V`,
      `                           в”Ӯ                     в”Ӯ`,
      `                          в”Җв”ҙв”Җ D                 в”Җв”ҙв”Җ`,
      `                           в–І                  [C=${this.C}ВөF]`,
      `                           в”Ӯ                     в”Ӯ`,
      `                          GND                   GND`,
      ``,
      `  fsw = ${this.fsw} Hz    D = ${this.D}    SW = ${this.switchOn ? 'ON' : 'off'}`,
      `  Vout = DВ·Vin = ${this.Vout} V    О· вүҲ 90вҖ“97 %`,
    ].join('\n');
  }
  xfChar(ch, pos, len) {
    if (ch === ' ' || ch === '\n') return ch;
    const bucketSize = 1 / 6;
    const bucket = Math.floor((pos / len) / bucketSize);
    const cyclePos = ((this.t * this.fsw) + bucket * 0.16) % 1;
    if (cyclePos < this.D) return ch;
    if (cyclePos < this.D + 0.1) return 'В·';
    return '_';
  }
  poem() {
    return `в–І PWM D=${this.D} fsw=${this.fsw}Hz вҖ” todo lo continuo es PWM bien filtrado`;
  }
  glosa() {
    return glosaBlock([
      'El lineal disipa lo que sobra; el conmutado recorta el tiempo',
      'en rebanadas y deja que L y C promedien la verdad por nosotros.',
      'Prigogine: estructuras disipativas, orden lejos del equilibrio.',
      'Wiener: el control es modulaciГіn del flujo, no su negaciГіn.',
      'в–І todo lo continuo вҖ”el sonido, la luz, el yoвҖ” es PWM filtrado.',
    ]);
  }
}

// в”Җв”Җ ANTENA DIPOLO в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

  get vNorm()    { return 0.5 + 0.5 * Math.sin(this.t * 1.5); }

      `   в•‘                          в•‘`,
      `   в•ҡв•җв•җв•җ(alimentaciГіn)в•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ`,
      `         в”„в”„в”„  О»/4 = ${fmt(this.L/2,3)}m  в”„в”„в”„`,
      ``,
      `   patrГіn de radiaciГіn (plano E):`,
      `              .в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ.`,
      `            .'           '.`,
      `           /     в—Ҹ в—Ҹ в—Ҹ     \\        вҶҗ mГЎx. broadside`,
      `          в•һв•җв•җв•җв•җв•җ DIPOLO в•җв•җв•җв•җв•Ў        вҶҗ nulo en los extremos`,
      `           \\     в—Ҹ в—Ҹ в—Ҹ     /`,
      `            '.           .'`,
      `              'в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ'`,
      ``,
      `  f = ${this.f} MHz    О» = ${this.lambda} m    L = ${this.L} m`,
      `  R_rad вүҲ 73 О©    G вүҲ 2.15 dBi    P_in = ${this.Pin} W`,
    ].join('\n');
  }
  xfChar(ch, pos, len) {
    if (ch === ' ' || ch === '\n') return ch;
    const norm = Math.sin(Math.PI * pos / Math.max(len-1,1));
    const v = norm * norm;
    const beat = 0.65 + 0.35 * Math.sin(this.t * 2);
    const final = v * beat;
    if (final > 0.7) return ch.toUpperCase();
    if (final > 0.35) return ch;
    if (final > 0.12) return 'В·';
    return '_';
  }
  poem() {
    return `вҲҝ radiando broadside вҖ” el espacio entero es una sola antena`;
  }
  glosa() {
    return glosaBlock([
      'Hertz, Karlsruhe 1886: la primera onda de radio cruzГі el aire sin hilo.',
      'Una antena no emite: convierte corriente en geometrГӯa.',
      'Haraway: vivimos en infraestructura electromagnГ©tica densa como el aire.',
      'Penzias y Wilson, 1965 вҖ” el zumbido tГ©rmico del universo a 2.725 K.',
      'вҲҝ el espacio entero es una sola antena, nosotros dentro de su patrГіn.',
    ]);
  }
}

// в”Җв”Җ COMPARADOR DE VENTANA в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
class ComparadorVentana {
  constructor() {
    this.Vcc = pick([5, 9, 12]);
    this.Vlo = +(Math.random() * 0.3 + 0.15).toFixed(2);
    this.Vhi = +(this.Vlo + Math.random() * 0.3 + 0.15).toFixed(2);
    this.f = +(Math.random() * 0.25 + 0.15).toFixed(2);
    this.t = 0;
    this.name = 'COMPARADOR DE VENTANA';
  }
  step(dt) { this.t += dt; }
  scanV() { return 0.5 + 0.5 * Math.sin(2*Math.PI*this.f*this.t); }
  get displayV() { return this.scanV() * this.Vcc; }
  get vNorm()    { return this.scanV(); }
  diagram() {
    const sv = this.scanV();
    const inside = (sv >= this.Vlo && sv <= this.Vhi);
    return [
      `              +Vcc=${this.Vcc}V`,
      `                  |`,
      `   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”җ    в”Ңв”Җв”Җв”ҙв”Җв”Җв”җ    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”җ`,
      `   в”Ӯ Vhi  в”Ӯв”Җв”Җв”Җв–¶в”Ӯ A1  в”Ӯв”Җв”Җв”Җв–¶в”Ӯ AND  в”Ӯв”Җв”Җв”Җв–¶ OUT`,
      `   в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҳ    в””в”Җв”Җв”Җв”Җв”Җв”ҳ    в”Ӯ      в”Ӯ`,
      `   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”җ    в”Ңв”Җв”Җв”Җв”Җв”Җв”җ    в”Ӯ      в”Ӯ`,
      `   в”Ӯ Vlo  в”Ӯв”Җв”Җв”Җв–¶в”Ӯ A2  в”Ӯв”Җв”Җв”Җв–¶в”Ӯ      в”Ӯ`,
      `   в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҳ    в””в”Җв”Җв”Җв”Җв”Җв”ҳ    в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҳ`,
      ``,
      `  Vlo  = ${this.Vlo}      Vhi = ${this.Vhi}`,
      `  scan = ${fmt(sv,3)}      f = ${this.f} Hz`,
      `  OUT  = ${inside ? 'EN VENTANA' : 'fuera'}`,
    ].join('\n');
  }
  xfChar(ch, pos, len) {
    if (ch === ' ' || ch === '\n') return ch;
    const vChar = pos / Math.max(len-1, 1);
    const sv = this.scanV();
    const W = this.Vhi - this.Vlo;
    const dist = Math.abs(vChar - sv);
    if (dist < W/2) return ch;
    if (dist < W) return 'В·';
    return '_';
  }
  poem() {
    return `вүҲ ventana [${this.Vlo}..${this.Vhi}]  scan=${fmt(this.scanV(),2)} вҖ” leer es comparar`;
  }
  glosa() {
    return glosaBlock([
      'Una ventana de voltaje recorre la seГұal вҖ” sГіlo lo que cae',
      'entre Vlo y Vhi pasa la doble compuerta.',
      'Spinoza: omnis determinatio est negatio вҖ” definir es excluir.',
      'Foucault: todo dispositivo de visibilidad es tambiГ©n de exclusiГіn.',
      'вүҲ leer es comparar con una ventana вҖ” la nuestra, la del otro.',
    ]);
  }
}

// в”Җв”Җ WAVEFORM BUFFER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const W = 50;
const H = 5;

class Waveform {
  constructor() {
    this.buf  = [];
    this.vmax = 1;
  }
  push(v) {
    this.buf.push(v);
    if (this.buf.length > W) this.buf.shift();
    if (v > this.vmax) this.vmax = v * 1.1;
  }
  render() {
    const lines = [];
    lines.push(`  в”„в”„в”„в”„в”„в”„ OSCILOSCOPIO в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„`);
    for (let r = 0; r < H; r++) {
      const v_level = this.vmax * (1 - r / (H - 1));
      const label   = fmt(v_level, 0).padStart(3);
      let row = `  ${label}V в”Ө`;
      for (let x = 0; x < W; x++) {
        const v   = x < this.buf.length ? this.buf[x] : 0;
        const row_for_v = Math.round((1 - clamp(v, 0, this.vmax) / this.vmax) * (H - 1));
        if (r === row_for_v)    row += 'вҖў';
        else if (r > row_for_v) row += 'В·';
        else                    row += ' ';
      }
      lines.push(row);
    }
    lines.push(`      в””${'в”Җ'.repeat(W)}вҶ’ t`);
    return lines.join('\n');
  }
}

// в”Җв”Җ TEXT TRANSFORM в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function xfText(text, circuit) {
  const chars = [...text];
  return chars.map((ch, i) => {
    if (ch === '\n') return '\n';
    return circuit.xfChar(ch, i, chars.length);
  }).join('');
}

// в”Җв”Җ MAIN LOOP в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const TYPES = [
  // originales
  RCLowpass, RLCResonator, Astable555, RCHighpass,
  // nuevos
  IntegradorOpAmp, SchmittBistable, ModuladorAM, RectificadorPuente,
  EspejoCorriente, PLLEnganche, OndaEstacionaria, BuckConverter,
  AntenaDipolo, ComparadorVentana,
];

let circuit, waveform, verse, lastTs, rafId, frameN = 0;

function init() {
  circuit  = new (pick(TYPES))();
  waveform = new Waveform();
  verse    = pick(VERSOS);
  lastTs   = null;
}

function loop(ts) {
  if (lastTs === null) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.04);
  lastTs = ts;

  circuit.step(dt);
  if (++frameN % 4 === 0) waveform.push(circuit.displayV);

  const tout = xfText(verse, circuit);
  const inFmt  = verse.replace(/\n/g, '\n        ');
  const outFmt = tout.replace(/\n/g, '\n        ');

  document.getElementById('out').textContent =
    `> CIRCUITO VIVO вҖ” TRANSFORMADOR DE SEГ‘AL POГүTICA\n\n` +
    `в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—\n` +
    `в•‘  ${circuit.name.padEnd(46)}в•‘\n` +
    `в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ\n\n` +
    circuit.diagram() + `\n\n` +
    waveform.render() + `\n\n` +
    `  в”„в”„в”„в”„в”„в”„ SEГ‘AL DE TEXTO в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„\n` +
    `  IN:   ${inFmt}\n\n` +
    `  OUT:  ${outFmt}\n\n` +
    `  ${circuit.poem()}\n\n` +
    circuit.glosa() + `\n\n` +
    `  в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„в”„\n` +
    `  [click В· space В· enter]  вҶ’  nuevo circuito`;

  rafId = requestAnimationFrame(loop);
}

function start() {
  if (rafId) cancelAnimationFrame(rafId);
  frameN = 0;
  init();
  rafId = requestAnimationFrame(loop);
}

window.onload = start;
document.addEventListener('click',   start);
document.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') start(); });
</script>
