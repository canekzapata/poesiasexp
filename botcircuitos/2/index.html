<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GENERADOR DE CIRCUITOS — v2 ampliada</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

<body>
<div id="terminal"><pre id="out"></pre></div>
<script>

  function rv(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
  function rf(a, b, d=2) { return (Math.random() * (b - a) + a).toFixed(d); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function pad(s, n) { return String(s).padEnd(n); }

  // ─────────────────────────────────────────────────────────────────
  //   CIRCUITOS ORIGINALES (con glosa filosófica ampliada)
  // ─────────────────────────────────────────────────────────────────

  function divisorVoltaje() {
    const V  = rv(5, 48);
    const R1 = rv(1, 220);
    const R2 = rv(1, 220);
    const Vo = +(V * R2 / (R1 + R2)).toFixed(2);
    const I  = +(V / (R1 + R2)).toFixed(3);
    const P  = +(V * I).toFixed(2);
    return `
╔══════════════════════════════════════════════════╗
║  DIVISOR DE VOLTAJE                              ║
╚══════════════════════════════════════════════════╝

          +${V}V
           │
        ┌──┴──┐
        │ R1  │   ${R1} kΩ
        └──┬──┘
           │
           ├─────────────────── Vout = ${Vo} V
           │
        ┌──┴──┐
        │ R2  │   ${R2} kΩ
        └──┬──┘
           │
          GND

  ───────────────────────────────────────────────
  ANÁLISIS DC
    Vout  =  ${Vo} V
    I     =  ${I} mA
    P     =  ${P} mW
    ratio =  R2/(R1+R2) = ${(R2/(R1+R2)).toFixed(4)}
  ───────────────────────────────────────────────
  GLOSA
    Dos resistencias y una decisión:
    repartir la tensión como se reparte una herencia.
    Spinoza: omnis determinatio est negatio —
    fijar Vout es negar todas las demás Vout posibles.
    ∿ la tensión se divide como la luz entre dos piedras.
`;
  }

  function filtroPasaBajas() {
    const R  = rv(1, 100);
    const C  = rv(10, 1000);
    const f3 = +(1000 / (2 * Math.PI * R * C)).toFixed(2);
    const tau = +(R * C / 1000).toFixed(3);
    return `
╔══════════════════════════════════════════════════╗
║  FILTRO RC  —  PASO-BAJAS                        ║
╚══════════════════════════════════════════════════╝

                   R = ${R} kΩ
  in ──────────[${pad(R+'kΩ',6)}]──────┬──── out
                                  │
                               ┌──┴──┐
                               │  C  │   ${C} nF
                               └──┬──┘
                                  │
                                 GND

  ───────────────────────────────────────────────
  ANÁLISIS AC
    f-3dB  =  ${f3} Hz
    τ      =  ${tau} ms
    |H(f)| =  1 / √(1 + (f/${f3})²)
    φ(f)   =  −arctan(f/${f3})
  ───────────────────────────────────────────────
  GLOSA
    El paso-bajas no censura — pondera.
    Toda escucha es un filtro: la oreja humana
    es un RC mecánico-neumático centrado cerca de 3 kHz.
    Pauline Oliveros llamó a esto deep listening.
    → el filtro no detiene la señal, la recuerda más despacio.
`;
  }

  function resonadorRLC() {
    const R  = rv(10, 500);
    const L  = rv(1, 100);
    const C  = rv(10, 470);
    const f0 = +(1000 / (2 * Math.PI * Math.sqrt(L * C))).toFixed(1);
    const Q  = +(1/R * Math.sqrt(L*1000/C)).toFixed(2);
    const Z0 = +(Math.sqrt(L*1000/C)).toFixed(1);
    return `
╔══════════════════════════════════════════════════╗
║  RESONADOR SERIE  RLC                            ║
╚══════════════════════════════════════════════════╝

                R=${R}Ω        L=${L}mH       C=${C}µF
  +V ──────[${pad(R+'Ω',5)}]──[${pad(L+'mH',5)}]──[${pad(C+'µF',5)}]──── GND

  ───────────────────────────────────────────────
  ANÁLISIS FRECUENCIAL
    f₀  =  ${f0} Hz          ← resonancia
    Q   =  ${Q}              ← factor de calidad
    Z₀  =  ${Z0} Ω           ← impedancia característica
    BW  =  ${+(f0/Q).toFixed(1)} Hz      ← ancho de banda
    Xl  =  2π·${f0}·${L}m = ${+(2*Math.PI*f0*L/1000).toFixed(1)} Ω
    Xc  =  1/(2π·${f0}·${C}µ) = ${+(1/(2*Math.PI*f0*C/1000000)).toFixed(1)} Ω
  ───────────────────────────────────────────────
  GLOSA
    En f₀ la inductiva y la capacitiva se anulan: el sistema
    deja de oponerse a la señal y se convierte en ella.
    Xenakis: la música como nubes que condensan en resonancias.
    Cada cuerpo tiene su f₀ — la Tierra misma a 7.83 Hz (Schumann).
    ∅ en la resonancia todo coincide — f₀ no se busca, se encuentra.
`;
  }

  function amplificadorNPN() {
    const Vcc = rv(9, 24);
    const Rc  = rv(1, 10);
    const Re  = rv(100, 1000);
    const beta = rv(80, 400);
    const Ic  = +((Vcc - 0.7) / (Rc*1000 + Re)).toFixed(3);
    const Av  = +(Rc*1000 / Re).toFixed(1);
    const Rin = +(beta * Re / 1000).toFixed(1);
    const Vce = +(Vcc - Ic*(Rc*1000 + Re)/1000).toFixed(2);
    return `
╔══════════════════════════════════════════════════╗
║  AMPLIFICADOR  NPN  —  EMISOR COMÚN              ║
╚══════════════════════════════════════════════════╝

          +Vcc = ${Vcc}V
               │
            ┌──┴──┐
            │ Rc  │   ${Rc} kΩ
            └──┬──┘
               │
               ├──────────────────────── Vout
               │
        B ─────┤  Q1 (β=${beta})
               │
            ┌──┴──┐
            │ Re  │   ${Re} Ω
            └──┬──┘
               │
              GND

  ───────────────────────────────────────────────
  PUNTO DE OPERACIÓN
    Ic    =  ${Ic} mA
    Vce   =  ${Vce} V
    Av    ≈  −${Av}           ← ganancia de voltaje
    Rin   ≈  ${Rin} kΩ
  ───────────────────────────────────────────────
  GLOSA
    Bardeen, Brattain, Shockley — Bell Labs, diciembre de 1947:
    un cristal aprendió a decidir cuánto deja pasar.
    El transistor es la primera materia que escucha.
    Kittler: no hay medios sin amplificación — y toda amplificación
    tiene su ruido propio, kT/q ≈ 25.85 mV a 300 K.
    × el transistor amplifica también lo que no debería escucharse.
`;
  }

  function opAmpInversor() {
    const R1 = rv(1, 47);
    const Rf = rv(10, 470);
    const Av = +(Rf / R1).toFixed(1);
    const BW = rv(100, 5000);
    const GBW = +(Av * BW / 1000).toFixed(1);
    return `
╔══════════════════════════════════════════════════╗
║  AMPLIFICADOR INVERSOR  —  OP-AMP                ║
╚══════════════════════════════════════════════════╝

                    Rf = ${Rf} kΩ
           ┌──────[${pad(Rf+'kΩ',6)}]──────┐
           │                        │
  in ──[${pad(R1+'kΩ',5)}]──┬──(−)          │
          R1=${R1}kΩ  │   [  A  ]──┴── out
                    GND (+ )
                        │
                       GND

  ───────────────────────────────────────────────
  ANÁLISIS
    Av    =  −Rf/R1  =  −${Av}
    Rin   =  R1  =  ${R1} kΩ
    BW    ≈  ${BW} Hz
    GBW   ≈  ${GBW} MHz
    Vout  =  −${Av} × Vin
  ───────────────────────────────────────────────
  GLOSA
    El nodo (−) es virtual ground: un cero que no es físico sino lógico,
    sostenido por la ganancia abierta hambrienta de cerrarse.
    Hegel: la negación que constituye el saber.
    La señal entra positiva, sale negada, mayor — ya es pensamiento.
    ⊕ todo razonar necesita un cero virtual sobre el cual apalancarse.
`;
  }

  function astable555() {
    const Vcc = pick([5, 9, 12, 15]);
    const Ra  = rv(1, 100);
    const Rb  = rv(1, 100);
    const C   = rv(1, 100);
    const f   = +(1000 / (0.693 * (Ra + 2*Rb) * C)).toFixed(2);
    const D   = +((Ra + Rb) / (Ra + 2*Rb) * 100).toFixed(1);
    const T   = +(1/f * 1000).toFixed(2);
    const Th  = +(0.693 * (Ra + Rb) * C / 1000).toFixed(3);
    const Tl  = +(0.693 * Rb * C / 1000).toFixed(3);
    return `
╔══════════════════════════════════════════════════╗
║  OSCILADOR ASTABLE  —  555                       ║
╚══════════════════════════════════════════════════╝

  +${Vcc}V ──┬────────────────────────┐
            │                        │ 8 (Vcc)
          [Ra]  ${Ra}kΩ             ┌─┴──────┐
            │                  7 ───┤ DIS    │
          [Rb]  ${Rb}kΩ         6 ───┤ THR   NE555
            │              ┌───┤        │
          [C]   ${C}µF     │   2 ───┤ TRG    │
            │              │        │        │
           GND             └────────┘  3 ────┴──── out
                                    │
                                   GND

  ───────────────────────────────────────────────
  PARÁMETROS
    f    =  ${f} Hz
    T    =  ${T} ms
    Th   =  ${Th} ms   (salida HIGH)
    Tl   =  ${Tl} ms   (salida LOW)
    D    =  ${D}%      (duty cycle)
  ───────────────────────────────────────────────
  GLOSA
    Hans Camenzind, 1972 — diseñó un chip que sólo sabía pulsar.
    El 555 no tiene memoria larga: olvida en cada periodo.
    Bergson distinguía chronos —tiempo medido— de durée —tiempo vivido—:
    el astable es la máquina más anti-bergsoniana posible.
    ■ no pregunta por qué — sólo pulsa, siempre pulsa.
`;
  }

  function puente() {
    const V   = rv(5, 24);
    const R1  = rv(10, 100);
    const R2  = rv(10, 100);
    const R3  = rv(10, 100);
    const Rx  = rv(10, 100);
    const bal = Math.abs(R1*Rx - R2*R3) < 500 ? "BALANCEADO" : "DESBALANCEADO";
    const Vg  = +(V * (R3/(R1+R3) - Rx/(R2+Rx))).toFixed(3);
    return `
╔══════════════════════════════════════════════════╗
║  PUENTE DE WHEATSTONE                            ║
╚══════════════════════════════════════════════════╝

              +${V}V
               │
         ┌─────┴─────┐
      [R1=${R1}kΩ] [R2=${R2}kΩ]
         │           │
         ├─────G─────┤    Vg = ${Vg} V
         │           │
      [R3=${R3}kΩ] [Rx=${Rx}kΩ]
         │           │
         └─────┬─────┘
              GND

  ───────────────────────────────────────────────
  ANÁLISIS
    Condición de balance:  R1/R2 = R3/Rx
    R1·Rx = ${R1*Rx}    R2·R3 = ${R2*R3}
    Estado: ${bal}
    Vg    = ${Vg} V
  ───────────────────────────────────────────────
  GLOSA
    Christie 1833, Wheatstone 1843: medir lo desconocido
    sólo con cosas que ya sabemos. R1·Rx = R2·R3 — el galvanómetro calla.
    Latour: todo dato es un montaje de mediaciones;
    el puente transforma una incógnita en una nulidad.
    ≈ tres referencias y la fe de que la cuarta será encontrable.
`;
  }

  // ─────────────────────────────────────────────────────────────────
  //   CIRCUITOS NUEVOS — versión 2 ampliada
  // ─────────────────────────────────────────────────────────────────

  function rectificadorPuente() {
    const Vac    = rv(6, 24);
    const C      = rv(100, 4700);
    const Iload  = rv(20, 500);
    const f      = pick([50, 60]);
    const Vpk    = +(Vac * Math.sqrt(2) - 1.4).toFixed(2);
    const Vripple= +(Iload / (2 * f * C / 1000)).toFixed(2);
    const Vdc    = +(Vpk - Vripple/2000).toFixed(2);
    return `
╔══════════════════════════════════════════════════╗
║  RECTIFICADOR PUENTE  +  FILTRO CAPACITIVO       ║
╚══════════════════════════════════════════════════╝

           AC ~ ${Vac}Vrms  @ ${f}Hz
                    │
            ┌───────┴───────┐
            │               │
           ─┼─ D1          ─┼─ D2
            ▼               ▲
            │               │
            ├───────┬───────┤────── +Vdc
            │       │       │
            ▲       │       ▼
           ─┼─ D4   │      ─┼─ D3
            │       │       │
            └───────┴───────┘
                    │
                    │     ┌─────┐
                    ├─────┤  C  │  ${C}µF
                    │     └──┬──┘
                              │
                             GND

  ───────────────────────────────────────────────
  ANÁLISIS
    Vpk      =  ${Vpk} V          (cresta tras dos caídas Vd)
    Vripple  ≈  ${Vripple} mVpp
    Vdc      ≈  ${Vdc} V
    Iload    =  ${Iload} mA
    fripple  =  ${2*f} Hz         (rectificación de onda completa)
  ───────────────────────────────────────────────
  GLOSA
    Cuatro diodos: cuatro decisiones sin sujeto.
    Rectificar —del latín rectus, recto— no es enderezar la verdad,
    es enderezar la fuerza. El capacitor rellena el valle con su memoria.
    Flusser: el aparato reescribe el código alterno en código lineal.
    ⊕ toda fuente continua es un mito útil — debajo, la onda sigue a ${2*f}Hz.
`;
  }

  function schmittTrigger() {
    const Vcc = pick([5, 9, 12, 15]);
    const R1  = rv(10, 100);
    const R2  = rv(10, 100);
    const Vh  = +(Vcc * R1 / (R1 + R2)).toFixed(2);
    const Vl  = +(-Vh).toFixed(2);
    const Hys = +(Vh - Vl).toFixed(2);
    return `
╔══════════════════════════════════════════════════╗
║  SCHMITT TRIGGER  —  COMPARADOR CON HISTÉRESIS   ║
╚══════════════════════════════════════════════════╝

                                +Vcc=${Vcc}V
                                     │
   Vin ────────────────────────────(−)
                                ┌────┴────┐
                                │    A    ├──┬──── Vout (±${Vcc}V)
   ┌───────────────────────────(+)        │  │
   │                            └─────────┘  │
   │                                         │
   ├──[R1=${R1}kΩ]── GND                     │
   │                                         │
   └──[R2=${R2}kΩ]──────────────────────────┘

   transferencia:    Vout
                      ▲
                +Vcc ─┤────────┐
                      │        │
                      │        │
                  ────┼────────┼────▶ Vin
                      │        │
                      │        │
                -Vcc ─┤────────┘
                      │  V_L  V_H

  ───────────────────────────────────────────────
  ANÁLISIS
    V_H    =  +${Vh} V          (umbral de subida)
    V_L    =   ${Vl} V          (umbral de bajada)
    ΔHys   =  ${Hys} V          (banda muerta)
    estado :  biestable — depende de la historia reciente
  ───────────────────────────────────────────────
  GLOSA
    Otto H. Schmitt, 1934 — estudiando el axón del calamar
    notó que la membrana usaba histéresis para no disparar dos veces.
    Una cosa para entrar, otra para salir.
    Luhmann llamaría a la banda muerta "indiferencia operativa".
    ▲ entre V_L y V_H habita la duda — y la duda también es memoria.
`;
  }

  function colpittsOsc() {
    const L  = rv(1, 100);
    const C1 = rv(10, 470);
    const C2 = rv(10, 470);
    const Cs = +((C1*C2)/(C1+C2)).toFixed(2);
    const f0 = +(1000000 / (2 * Math.PI * Math.sqrt(L * Cs))).toFixed(1);
    return `
╔══════════════════════════════════════════════════╗
║  OSCILADOR COLPITTS  —  TANQUE LC CON TAP        ║
╚══════════════════════════════════════════════════╝

       +Vcc
         │
       [Rc]
         │
         ├─────────────────── out
         │
       ┌─┴─┐
       │ Q │
       └─┬─┘
         │
   ┌─────┼─────┐
   │     │     │
  [L=${pad(L+'mH',5)}] │     │
   │     │     │
   ├─────┤     │   tanque resonante
   │     │     │
   ├──[C1=${C1}pF]──┤  ← tap
   │           │
   ├──[C2=${C2}pF]──┘
   │
  GND

  ───────────────────────────────────────────────
  ANÁLISIS
    Cs = C1·C2/(C1+C2) = ${Cs} pF
    f₀ = 1/(2π√(L·Cs))  =  ${f0} Hz
    realimentación  :  divisor capacitivo  C1/C2
    condición Barkhausen  :  |A·β| ≥ 1 ,  ∠A·β = 0
  ───────────────────────────────────────────────
  GLOSA
    Colpitts, 1918 — un tanque que se canta a sí mismo.
    Sin fuente externa de melodía: el ruido térmico basta como aliento inicial.
    Maturana: autopoiesis eléctrica — produce los componentes que lo producen.
    Cage lo escucharía como 4'33" en banda estrecha: el silencio ya oscila.
    ∿ todo oscilador es una pregunta que se contesta sola.
`;
  }

  function pllLoop() {
    const fref = rv(100, 9999);
    const N    = rv(2, 256);
    const fvco = fref * N;
    const Kpd  = rf(0.1, 2, 2);
    const Kvco = rv(100, 9999);
    return `
╔══════════════════════════════════════════════════╗
║  PHASE-LOCKED LOOP  —  PLL                       ║
╚══════════════════════════════════════════════════╝

   ref(${fref}Hz) ──┐
                   │   ┌─────┐   ┌─────┐   ┌─────┐
                   ├──▶│ PFD │──▶│ LPF │──▶│ VCO │──┬── out (${fvco}Hz)
                   │   └─────┘   └─────┘   └─────┘  │
                   │                                │
                   │           ┌───────────┐        │
                   └───────────┤  ÷ N=${pad(N,3)} ◀──────┘
                               └───────────┘

  ───────────────────────────────────────────────
  ANÁLISIS
    f_out  =  N · f_ref   =  ${fvco} Hz
    K_PD   =  ${Kpd} V/rad
    K_VCO  =  ${Kvco} Hz/V
    régimen :  fase enganchada , Δφ → constante
  ───────────────────────────────────────────────
  GLOSA
    Huygens, La Haya 1665: dos péndulos en la misma viga sincronizándose solos.
    Sympathie des horloges. El PLL formaliza ese asombro 300 años después.
    Sincronía no es identidad — es diferencia constante, fase fija.
    Stiegler: toda comunidad técnica es sincronización de retenciones.
    ⊕ antes del mensaje, la fase. Antes de la fase, el querer.
`;
  }

  function espejoCorriente() {
    const Vcc = pick([5, 9, 12, 15]);
    const Rref= rv(1, 47);
    const Iref= +((Vcc - 0.7) / Rref).toFixed(3);
    const beta= rv(80, 400);
    const Iout= +(Iref * (1 - 2/beta)).toFixed(3);
    const err = +((Iref - Iout)/Iref * 100).toFixed(2);
    return `
╔══════════════════════════════════════════════════╗
║  ESPEJO DE CORRIENTE  —  PAR NPN                 ║
╚══════════════════════════════════════════════════╝

           +Vcc = ${Vcc}V
               │
           [Rref = ${Rref}kΩ]              [carga]
               │                              │
               ├──────────┬───────────────┐   │
               │          │               │   │
               ▼          ▼               ▼   │
             ┌───┐      ┌───┐           ┌───┐ │
             │ Q1│      │   │           │ Q2│ │
             └─┬─┘      │   │           └─┬─┘ │
               │ ───────┘   │             │   │
               │            │             │   │
               │            └─────────────┤   │
               │                          │   │
               └──────────┬───────────────┘   │
                          │                   │
                         GND                  ▼
                                          a la carga

   (bases comunes — Q1 "diodo-conectado" — β = ${beta})

  ───────────────────────────────────────────────
  ANÁLISIS
    I_ref  ≈  (Vcc − Vbe) / Rref   =  ${Iref} mA
    I_out  ≈  ${Iout} mA            (error ≈ 2/β ≈ ${err}%)
    Z_out  alta — la salida fija I, no V
  ───────────────────────────────────────────────
  GLOSA
    Q1 mira a Q2 y dice: serás como yo.
    No es copia exacta — el error 2/β es la firma del original.
    Benjamin: la copia pierde aura pero gana circulación;
    el espejo electrónico hace eso miles de veces por chip.
    ⊥ la pequeña desviación sistemática es lo que llamamos estilo.
`;
  }

  function integradorOpAmp() {
    const R  = rv(1, 100);
    const C  = rv(1, 470);
    const tau= +(R * C / 1000).toFixed(3);
    const fcorte = +(1000000 / (2*Math.PI*R*C)).toFixed(2);
    return `
╔══════════════════════════════════════════════════╗
║  INTEGRADOR  —  OP-AMP                           ║
╚══════════════════════════════════════════════════╝

                          C = ${C} nF
              ┌──────[ ═══════ ]──────┐
              │                       │
   in ──[${pad(R+'kΩ',5)}]───────┬──(−)             │
                            │   ┌─────┐    │
                            │   │  A  ├────┴── out
                           GND  └─(+)─┘
                                  │
                                 GND

   respuesta a escalón:
       Vin ──┐
             │_________________
       Vout
             ╲
              ╲___ pendiente = −Vin/(RC)
                  ╲___
                      ╲___

  ───────────────────────────────────────────────
  ANÁLISIS
    Vout(t) = − 1/(R·C) · ∫ Vin(t) dt
    τ        =  R·C    =  ${tau} ms
    f_corte ≈  1/(2π·R·C)  =  ${fcorte} Hz
    en DC :  ganancia → ∞   (requiere Rf en paralelo a C)
  ───────────────────────────────────────────────
  GLOSA
    El integrador no responde — acumula. A cada presente le suma
    todo el pasado, dividido por su propia inercia RC.
    Stiegler: tertiary retention, técnica como memoria exteriorizada.
    Whitehead: la realidad es prensión de ocasiones anteriores.
    ∫ olvidar es resetear C a tierra — la huella iónica permanece.
`;
  }

  function lineaTransmision() {
    const Z0 = pick([50, 75, 300, 600]);
    const ZL = rv(10, 1200);
    const f  = rv(1, 3000);
    const eps= +rf(1.0, 2.5, 2);
    const v  = +(3e8 / Math.sqrt(eps) / 1e6).toFixed(1);
    const lambda = +(v / f).toFixed(2);
    const G  = (ZL - Z0)/(ZL + Z0);
    const VSWR = +((1 + Math.abs(G))/(1 - Math.abs(G))).toFixed(2);
    const estado = Math.abs(G) < 0.1 ? 'adaptada — sin eco' : 'desadaptada — eco hacia la fuente';
    return `
╔══════════════════════════════════════════════════╗
║  LÍNEA DE TRANSMISIÓN  —  ONDA ESTACIONARIA      ║
╚══════════════════════════════════════════════════╝

   fuente ───[Z₀=${Z0}Ω]══════════════════[ZL=${ZL}Ω]
                       ↑          ↑          ↑
                     nodo     antinodo     nodo
                     |V|min     |V|max     |V|min

   │∿∿∿│       │∿∿∿│       │∿∿∿│       │∿∿∿│
   ────────────────────────────────────────────────▶ x
   0          λ/4         λ/2         3λ/4         λ

  ───────────────────────────────────────────────
  ANÁLISIS
    f       =  ${f} MHz
    εr      =  ${eps}        v = c/√εr = ${v}·10⁶ m/s
    λ       =  ${lambda} m
    Γ       =  (ZL − Z₀)/(ZL + Z₀)  =  ${G.toFixed(3)}
    VSWR    =  ${VSWR}
    estado  =  ${estado}
  ───────────────────────────────────────────────
  GLOSA
    Una línea desadaptada devuelve parte de la señal a quien la emitió:
    reflexión en física, eco en acústica, malentendido en literatura.
    Kittler: los medios son canales con impedancia — toda transmisión deja residuo.
    Entre dos personas que no terminan en Z₀ vibra una onda estacionaria.
    ⊕ adaptar la impedancia es un acto amoroso: hacerse del tamaño del otro.
`;
  }

  function moduladorAM() {
    const fc = rv(500, 1600);
    const fm = rv(1, 15);
    const m  = +rf(0.1, 0.95, 2);
    const Pc = rv(50, 500);
    const Pt = +(Pc * (1 + m*m/2)).toFixed(1);
    return `
╔══════════════════════════════════════════════════╗
║  MODULADOR AM  —  PORTADORA + MENSAJE            ║
╚══════════════════════════════════════════════════╝

   mensaje μ(t) ──┐
   (audio)        │
                  ▼
              ┌───────┐
              │   ×   │────── s(t) = [1 + m·μ(t)] · cos(2π·fc·t)
              │       │
              └───────┘
                  ▲
   portadora cos(2π·fc·t) ──┘
   (RF)

   espectro:
        fc−fm        fc        fc+fm
          ▼          ▼           ▼
   ───────┃──────────╋───────────┃──────── f
         LSB     portadora      USB

  ───────────────────────────────────────────────
  ANÁLISIS
    fc      =  ${fc} kHz       (portadora)
    fm      =  ${fm} kHz        (mensaje)
    m       =  ${m}            (índice de modulación)
    Pc      =  ${Pc} W          (potencia de portadora)
    Pt      =  ${Pt} W         (total con bandas laterales)
    BW      =  2·fm   =  ${2*fm} kHz
  ───────────────────────────────────────────────
  GLOSA
    Fessenden, Nochebuena 1906: una voz humana sobre una onda hertziana,
    por primera vez. El mensaje no se transmite: cabalga.
    El índice m mide cuánto te dejás afectar por lo que llevás.
    Shannon, 1948: la información es la sorpresa del símbolo.
    × hablar es modular — imprimirle al silencio una envolvente.
`;
  }

  function buckConverter() {
    const Vin = pick([12, 24, 48]);
    const D   = +rf(0.1, 0.9, 2);
    const fsw = rv(50, 1000);
    const L   = rv(10, 470);
    const C   = rv(10, 470);
    const Vout= +(D * Vin).toFixed(2);
    const Iout= rv(100, 3000);
    const dIL = +(Vout*(1-D)/(fsw*L) * 1000).toFixed(2);
    return `
╔══════════════════════════════════════════════════╗
║  BUCK CONVERTER  —  REDUCTOR DC-DC               ║
╚══════════════════════════════════════════════════╝

   Vin=${Vin}V ──[ SW ]──┬───[L=${L}µH]───┬───── Vout=${Vout}V
                        │                │
                       ─┴─ D            ─┴─
                        ▲              [C=${C}µF]
                        │                │
                       GND              GND

           PWM @ ${fsw} kHz ,  D = ${D}
           ▓▓▓▓▓░░░░░▓▓▓▓▓░░░░░▓▓▓▓▓░░░░░▓▓▓▓▓
           on  off    on  off    on  off    on

  ───────────────────────────────────────────────
  ANÁLISIS
    Vout   =  D · Vin     =  ${Vout} V
    Iout   ≈  ${Iout} mA
    ΔIL    ≈  ${dIL} mA   (ripple en el inductor)
    η      ≈  90 – 97 %   (no hay disipación intencional)
  ───────────────────────────────────────────────
  GLOSA
    El lineal disipa lo que sobra; el conmutado recorta el tiempo en rebanadas
    y deja que L y C promedien la verdad por nosotros.
    Prigogine: estructuras disipativas, orden lejos del equilibrio.
    Wiener: el control es modulación del flujo, no su negación.
    ▲ todo lo continuo —el sonido, la luz, el yo— es PWM bien filtrado.
`;
  }

  function antenaDipolo() {
    const f   = rv(50, 2500);
    const lambda = +(300 / f).toFixed(2);
    const L   = +(lambda / 2).toFixed(2);
    const Rrad= 73;
    const Pin = rv(1, 500);
    const Erad= +(Math.sqrt(30*Pin)).toFixed(2);
    return `
╔══════════════════════════════════════════════════╗
║  ANTENA DIPOLO  λ/2  —  PATRÓN DE RADIACIÓN      ║
╚══════════════════════════════════════════════════╝

              ┄┄┄  λ/4 = ${(L/2).toFixed(2)}m  ┄┄┄
        ╔════════════════════════╗
        ║                        ║
   ═════╝       (alimentación)   ╚═════
              ↑              ↑
              │              │
              ─── coaxial ───
              ┄┄┄  λ/4 = ${(L/2).toFixed(2)}m  ┄┄┄

   patrón en plano E  (toroide visto de perfil):
                       ▲
                  .─────────.
                .'           '.
               /     ●●●●●     \\        ← máx. broadside
              ╞═════ DIPOLO ════╡        ← nulo en los extremos
               \\     ●●●●●     /
                '.           .'
                  '─────────'
                       ▼

  ───────────────────────────────────────────────
  ANÁLISIS
    f         =  ${f} MHz
    λ         =  ${lambda} m
    L total   =  λ/2   =  ${L} m
    R_rad     ≈  ${Rrad} Ω    (resistencia de radiación ideal)
    G         ≈  2.15 dBi
    P_in      =  ${Pin} W   →  E ≈ ${Erad}/r  V/m
  ───────────────────────────────────────────────
  GLOSA
    Hertz, Karlsruhe 1886: la primera onda de radio cruzó su laboratorio sin hilo.
    Una antena no emite: convierte corriente en geometría.
    Haraway: vivimos en una infraestructura electromagnética densa como el aire.
    Penzias y Wilson, 1965 — escucharon el zumbido térmico del universo a 2.725 K.
    ∿ el espacio entero es una sola antena, y nosotros dentro de su patrón.
`;
  }

  // ─────────────────────────────────────────────────────────────────
  //   ORQUESTACIÓN
  // ─────────────────────────────────────────────────────────────────

  const encabezados = [
    `> GENERADOR DE ESQUEMAS v0.${rv(1,9)}  —  CIRCUITO POÉTICO`,
    `> CIRCUIT DIAGRAM GEN  —  SEÑAL ACTIVA`,
    `> ESQUEMA #{n}  —  PULSO DETECTADO`,
    `> MODO: DIAGRAMA  —  f={f}Hz  T={t}ms`,
    `> NODO ACTIVO #{n}  —  GLOSA EN ESPERA`,
    `> CIRCUITO COMO ESCRITURA  —  v0.{n}`,
    `> ESQUEMA #{n}  —  MATERIA SEÑALADA`,
    `> KITTLER MODE  —  canal abierto @ {f}Hz`,
    `> DEEP LISTENING  —  S/N por calcular`,
    `> ESTRUCTURA DISIPATIVA #{n}  —  Prigogine ON`,
    `> SIMONDON LOOP  —  individuación técnica en curso`,
    `> BERGSON CLOCK  —  durée @ {t}ms`,
  ];

  const generadores = [
    // originales
    divisorVoltaje, filtroPasaBajas, resonadorRLC,
    amplificadorNPN, opAmpInversor, astable555, puente,
    // nuevos
    rectificadorPuente, schmittTrigger, colpittsOsc, pllLoop,
    espejoCorriente, integradorOpAmp, lineaTransmision,
    moduladorAM, buckConverter, antenaDipolo,
  ];

  let count = 0;

  function encabezado() {
    const f = rv(50, 9999);
    return pick(encabezados)
      .replace('{n}', String(++count).padStart(4,'0'))
      .replace('{f}', f)
      .replace('{t}', +(1000/f).toFixed(2));
  }

  let timer = null;

  function render() {
    if (timer) clearInterval(timer);
    const out = document.getElementById('out');
    out.textContent = '';
    const texto = encabezado() + '\n' + pick(generadores)();
    let i = 0;
    timer = setInterval(() => {
      // dos chars por tick — texto más largo, ritmo de máquina de escribir mantenido
      for (let k = 0; k < 2 && i < texto.length; k++) {
        out.textContent += texto[i++];
      }
      out.parentElement.scrollTop = out.parentElement.scrollHeight;
      if (i >= texto.length) {
        clearInterval(timer);
        timer = null;
      }
    }, 26);
  }

  window.onload = render;
  document.addEventListener('click', render);
  document.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') render();
  });

</script>
