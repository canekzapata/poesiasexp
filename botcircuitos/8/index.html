function pick(a) { return a[Math.random() * a.length | 0]; }
function rv(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function rf(a, b, d=1) { return +(Math.random() * (b - a) + a).toFixed(d); }
function maybe(p) { return Math.random() < p; }

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

// tipografías oldschool CP437 — todas monoespaciadas, alinean el ASCII;
// los glifos ausentes (kaomoji, ∿, subíndices) caen a Courier New
const TYPEFACES = [
  'SperryPC','Robotron','OlivettiThin','SiemensPCD','ApricotPortable',
  'Compis','IBM_Model3x','IBM_PS55','Stingray','ToshibaSat','HP150','Paradise132',
];
const FONT_SIZE = { micro: 10, small: 12, medium: 15, large: 22, drop: 34 };
const FONTS = { micro: '', small: '', medium: '', large: '', drop: '' };
const LH = { micro: 12, small: 16, medium: 20, large: 28, drop: 44 };
const CW = { micro: 6, small: 7.2, medium: 9, large: 13.2, drop: 20.4 };
let typeIdx = 0;

function measureFonts() {
  for (const k in FONTS) {
    ctx.font = FONTS[k];
    CW[k] = ctx.measureText('M').width || CW[k];
  }
}

// aplica una tipografía a todos los tamaños y re-mide al cargar la fuente
function applyTypeface(idx) {
  typeIdx = ((idx % TYPEFACES.length) + TYPEFACES.length) % TYPEFACES.length;
  const fam = TYPEFACES[typeIdx];
  for (const k in FONT_SIZE) {
    FONTS[k] = `${FONT_SIZE[k]}px '${fam}', 'Courier New', monospace`;
  }
  measureFonts();
  if (document.fonts && document.fonts.load) {
    document.fonts.load(`16px '${fam}'`).then(measureFonts).catch(() => {});
  }
}

function colorFor(name, alpha) {
  const a = Math.max(0, Math.min(1, alpha));
  switch (name) {
    case 'green': return `rgba(0, ${Math.round(255*a)}, ${Math.round(65*a)}, 1)`;
    case 'dim':   return `rgba(0, ${Math.round(135*a)}, ${Math.round(35*a)}, 1)`;
    case 'ghost': return `rgba(0, ${Math.round(85*a)}, ${Math.round(22*a)}, 1)`;
    case 'red':   return `rgba(255, ${Math.round(60*a)}, ${Math.round(50*a)}, ${a})`;
    case 'amber': return `rgba(255, ${Math.round(170*a)}, ${Math.round(20*a)}, ${a})`;
    case 'white': return `rgba(${Math.round(200*a)}, ${Math.round(225*a)}, 255, ${a})`;
    default:      return `rgba(0, ${Math.round(255*a)}, ${Math.round(65*a)}, 1)`;
  }
}

// =============================================================
//   BLOCK  ::  unidad de display
// =============================================================

class Block {
  constructor(opts) {
    this.lines    = opts.lines || [];
    this.x        = opts.x;
    this.y        = opts.y;
    this.font     = opts.font || 'medium';
    this.color    = opts.color || 'green';
    this.born     = T;
    this.life     = opts.life || 8;
    this.typed    = 0;
    this.typeSpeed= opts.typeSpeed || 80;
    this.text     = this.lines.join('\n');
    this.glitch   = opts.glitch || 0;
    this.kind     = opts.kind || 'diag';
    this.drift    = opts.drift || { x: 0, y: 0 };
  }

  update(dt) {
    this.typed = Math.min(this.text.length, this.typed + this.typeSpeed * dt);
    this.x += this.drift.x * dt;
    this.y += this.drift.y * dt;
  }

  get age()   { return T - this.born; }
  get alive() {
    if (this.age >= this.life) return false;
    // ticker dies when fully off-screen
    if (this.kind === 'ticker' && this.x + (this.text.length * CW[this.font]) < -50) return false;
    return true;
  }

  get alpha() {
    const a = this.age;
    const fadeIn = 0.4;
    if (a < fadeIn) return a / fadeIn;
    if (a > this.life - 1.2) return Math.max(0, (this.life - a) / 1.2);
    return 1;
  }

  draw() {
    ctx.font = FONTS[this.font];
    const lh = LH[this.font];
    let alpha = this.alpha;
    if (this.kind === 'ghost') alpha *= 0.35;

    const slice = this.text.slice(0, Math.floor(this.typed));
    const visLines = slice.split('\n');

    // glitch ocasional: una línea, un char reemplazado por bloque
    if (this.glitch > 0 && visLines.length > 0 && Math.random() < this.glitch * 0.18) {
      const li = Math.floor(Math.random() * visLines.length);
      const line = visLines[li];
      if (line.length > 0) {
        const ci = Math.floor(Math.random() * line.length);
        const gc = '▓░▒█▌▐'[Math.floor(Math.random() * 6)];
        visLines[li] = line.slice(0, ci) + gc + line.slice(ci + 1);
      }
    }

    for (let i = 0; i < visLines.length; i++) {
      ctx.fillStyle = colorFor(this.color, alpha);
      ctx.fillText(visLines[i], this.x, this.y + i * lh);
    }

    // cursor de typewriter parpadeante mientras se está escribiendo
    if (this.typed < this.text.length && Math.floor(T * 4) % 2 === 0) {
      const charsInLastLine = (this.text.slice(0, Math.floor(this.typed)).split('\n').pop() || '').length;
      const cx = this.x + charsInLastLine * CW[this.font];
      const cy = this.y + (visLines.length - 1) * lh;
      ctx.fillStyle = colorFor(this.color, alpha);
      ctx.fillText('█', cx, cy);
    }
  }
}

const AUDIO = {

  initing: false,

// percusión :: 'x' = golpe, '.' = silencio — 16 pasos por compás
function patBeats(s) { return [...s].map(c => c === 'x' || c === 'X'); }

const PERC_PATTERNS = {
  terminal: { bpm: 96,  kick: patBeats('x.......x.......'), hat: patBeats('..x...x...x...x.'), rim: patBeats('....x.......x...'), zap: patBeats('................') },
  mosaico:  { bpm: 112, kick: patBeats('x...x...x...x...'), hat: patBeats('x.x.x.x.x.x.x.x.'), rim: patBeats('....x.......x...'), zap: patBeats('........x.......') },
  glitch:   { bpm: 134, kick: patBeats('x..x..x.x..x..x.'), hat: patBeats('xxxxxxxxxxxxxxxx'), rim: patBeats('..x..x..x..x..x.'), zap: patBeats('x...x...x...x..x') },
  drone:    { bpm: 60,  kick: patBeats('x...............'), hat: patBeats('........x.......'), rim: patBeats('................'), zap: patBeats('................') },
  cita:     { bpm: 82,  kick: patBeats('x.......x.......'), hat: patBeats('....x.......x...'), rim: patBeats('................'), zap: patBeats('................') },
  ticker:   { bpm: 126, kick: patBeats('x...x...x...x...'), hat: patBeats('x.x.x.x.x.x.x.x.'), rim: patBeats('..x...x...x...x.'), zap: patBeats('................') },
  feedback: { bpm: 104, kick: patBeats('x...x.....x...x.'), hat: patBeats('..x.x...x.x...x.'), rim: patBeats('x.......x.......'), zap: patBeats('............x...') },
  memoria:  { bpm: 68,  kick: patBeats('x.............x.'), hat: patBeats('....x.......x...'), rim: patBeats('................'), zap: patBeats('................') },
  burst:    { bpm: 152, kick: patBeats('x.xx..x.x.xx.x.x'), hat: patBeats('xxxxxxxxxxxxxxxx'), rim: patBeats('x.x.x.x.x.x.x.x.'), zap: patBeats('..x..x..x..x..x.') },
};

// bpm efectivo :: base de la escena modulada por el tempo del VJ
function percBpm() {
  const base = (PERC_PATTERNS[scene.name] || PERC_PATTERNS.terminal).bpm;
  return Math.max(48, Math.min(200, base * (0.7 + 0.3 * tempo)));
}

function syncPercTempo() {
  if (AUDIO.ready && typeof Tone !== 'undefined') Tone.Transport.bpm.rampTo(percBpm(), 0.4);
}

// el contexto de audio sólo arranca tras un gesto del usuario
async function initAudio() {
  if (AUDIO.ready || AUDIO.initing || typeof Tone === 'undefined') return;
  AUDIO.initing = true;
  try { await Tone.start(); }
  catch (e) { AUDIO.initing = false; return; }

  const limiter   = new Tone.Limiter(-2).toDestination();
  const reverb    = new Tone.Reverb({ decay: 2.6, wet: 0.16 }).connect(limiter);
  reverb.generate().catch(() => {});
  const masterBus = new Tone.Gain(0.85).connect(reverb);

  // — circuito: bleeps cortos, sonda lógica —
  const delay       = new Tone.FeedbackDelay({ delayTime: 0.165, feedback: 0.26, wet: 0.16 }).connect(masterBus);
  const bleepFilter = new Tone.Filter({ type: 'lowpass', frequency: 3400, Q: 1 }).connect(masterBus);
  bleepFilter.connect(delay);
  const bleep = new Tone.Synth({
    volume: -13,
    oscillator: { type: 'square' },
    envelope: { attack: 0.001, decay: 0.085, sustain: 0, release: 0.05 },
  }).connect(bleepFilter);

  // — cita: ping suave de sintetizador —
  const blip = new Tone.Synth({
    volume: -19,
    oscillator: { type: 'triangle' },
    envelope: { attack: 0.005, decay: 0.55, sustain: 0, release: 0.5 },
  }).connect(bleepFilter);

  // — bed de vocoder: carrier sawtooth → banco de filtros formantes —
  const vocMaster = new Tone.Gain(0).connect(masterBus);
  const carrier   = new Tone.Oscillator({ frequency: 82, type: 'sawtooth', volume: -4 });
  const bands = [];
  for (const f of [320, 1100, 2700]) {
    const bp = new Tone.Filter({ type: 'bandpass', frequency: f, Q: 7 });
    const g  = new Tone.Gain(0).connect(vocMaster);
    carrier.connect(bp);
    bp.connect(g);
    bands.push(g);
  }
  carrier.start();

  // — percusión :: caja de ritmos eléctrica sobre Tone.Transport —
  const percBus = new Tone.Gain(0.8).connect(masterBus);
  const kick = new Tone.MembraneSynth({
    volume: -7, pitchDecay: 0.045, octaves: 5,
    envelope: { attack: 0.001, decay: 0.34, sustain: 0, release: 0.35 },
  }).connect(percBus);
  const hatFilter = new Tone.Filter({ type: 'highpass', frequency: 7000 }).connect(percBus);
  const hat = new Tone.NoiseSynth({
    volume: -25, noise: { type: 'white' },
    envelope: { attack: 0.001, decay: 0.035, sustain: 0 },
  }).connect(hatFilter);
  const rim = new Tone.MetalSynth({
    volume: -28, frequency: 240, harmonicity: 5.1, modulationIndex: 32,
    resonance: 3200, octaves: 1.3,
    envelope: { attack: 0.001, decay: 0.07, release: 0.02 },
  }).connect(percBus);
  const zapFilter = new Tone.Filter({ type: 'bandpass', frequency: 1200, Q: 3 }).connect(percBus);
  const zap = new Tone.NoiseSynth({
    volume: -20, noise: { type: 'pink' },
    envelope: { attack: 0.001, decay: 0.14, sustain: 0 },
  }).connect(zapFilter);

  // un paso por '16n'; el patrón sigue a la escena viva
  const percSeq = new Tone.Sequence((time, step) => {
    if (!AUDIO.enabled || !AUDIO.perc) return;
    const p = PERC_PATTERNS[scene.name] || PERC_PATTERNS.terminal;
    if (p.kick[step]) kick.triggerAttackRelease('C1', '8n', time);
    if (p.hat[step])  hat.triggerAttackRelease('16n', time, 0.6 + Math.random() * 0.4);
    if (p.rim[step])  rim.triggerAttackRelease('32n', time, 0.8);
    if (p.zap[step]) {
      zapFilter.frequency.cancelScheduledValues(time);
      zapFilter.frequency.setValueAtTime(2600, time);
      zapFilter.frequency.exponentialRampToValueAtTime(220, time + 0.13);
      zap.triggerAttackRelease('16n', time);
    }
  }, [...Array(16).keys()], '16n');
  percSeq.start(0);
  Tone.Transport.bpm.value = percBpm();
  Tone.Transport.start();

  AUDIO.n = {
    limiter, reverb, masterBus, delay, bleepFilter, bleep, blip,
    vocMaster, carrier, bands, percBus, kick, hat, rim, zap, percSeq,
  };
  AUDIO.ready = true;
  AUDIO.initing = false;
}

// circuito :: motivo corto de 2-4 notas al aparecer un diagrama
function audioDiagram() {
  if (!AUDIO.ready || !AUDIO.enabled) return;
  const t = Tone.now();
  if (t - AUDIO.last.diag < 0.14) return;
  AUDIO.last.diag = t;
  const len   = 2 + (Math.random() * 3 | 0);
  const start = (Math.random() * (AUDIO.scale.length - len)) | 0;
  const up    = Math.random() < 0.5;
  for (let i = 0; i < len; i++) {
    const idx = up ? start + i : start + len - 1 - i;
    AUDIO.n.bleep.triggerAttackRelease(AUDIO.scale[idx], 0.05, t + i * 0.075);
  }
}

// cita/glosa :: ping suave
function audioCita() {
  if (!AUDIO.ready || !AUDIO.enabled) return;
  const note = AUDIO.scale[6 + (Math.random() * (AUDIO.scale.length - 6) | 0)];
  AUDIO.n.blip.triggerAttackRelease(note, 0.5, Tone.now());
}

// — voz híbrida :: Web Speech lee el texto + bed de vocoder de Tone.js —
let _voices = [];
function loadVoices() { if (window.speechSynthesis) _voices = speechSynthesis.getVoices() || []; }
if (window.speechSynthesis) {
  loadVoices();
  speechSynthesis.addEventListener('voiceschanged', loadVoices);
}
function pickVoice() {
  const es = _voices.filter(v => /^es/i.test(v.lang));
  return es.length ? es[(Math.random() * es.length) | 0] : null;
}

function speak(text) {
  if (!AUDIO.enabled || !window.speechSynthesis || !text) return;
  if (speechSynthesis.speaking || speechSynthesis.pending) return;
  if (AUDIO.ready && Tone.now() - AUDIO.last.speakEnd < 1.4) return;
  const u  = new SpeechSynthesisUtterance(text);
  u.lang   = 'es-ES';
  u.pitch  = 0.3 + Math.random() * 0.35;   // grave → robótico
  u.rate   = 0.84 + Math.random() * 0.26;
  u.volume = 0.9;
  const v  = pickVoice();
  if (v) u.voice = v;
  u.onstart    = vocoderStart;
  u.onboundary = vocoderPulse;
  u.onend      = vocoderStop;
  u.onerror    = vocoderStop;
  speechSynthesis.speak(u);
}

// el bed se enciende mientras habla y pulsa al ritmo de las palabras
function vocoderStart() {
  if (!AUDIO.ready) return;
  AUDIO.n.vocMaster.gain.cancelScheduledValues(Tone.now());
  AUDIO.n.vocMaster.gain.rampTo(0.18, 0.3);
  vocoderPulse();
  clearInterval(AUDIO.speakTimer);
  AUDIO.speakTimer = setInterval(vocoderPulse, 95 + Math.random() * 80);
}

function vocoderPulse() {
  if (!AUDIO.ready) return;
  const t = Tone.now();
  for (const g of AUDIO.n.bands) {
    g.gain.cancelScheduledValues(t);
    g.gain.setValueAtTime(Math.max(0, g.gain.value), t);
    g.gain.linearRampToValueAtTime(0.12 + Math.random() * 0.7, t + 0.025);
    g.gain.linearRampToValueAtTime(Math.random() * 0.08, t + 0.085 + Math.random() * 0.07);
  }
  AUDIO.n.carrier.frequency.rampTo(68 + Math.random() * 64, 0.05);
}

function vocoderStop() {
  clearInterval(AUDIO.speakTimer);
  AUDIO.speakTimer = null;
  if (!AUDIO.ready) return;
  AUDIO.n.vocMaster.gain.rampTo(0, 0.45);
  AUDIO.last.speakEnd = Tone.now();
}

function toggleSound() {
  AUDIO.enabled = !AUDIO.enabled;
  if (!AUDIO.enabled) {
    if (window.speechSynthesis) speechSynthesis.cancel();
    vocoderStop();
  }
}

function pickPos(estW, estH) {
  for (let i = 0; i < 30; i++) {
    const x = rv(20, Math.max(20, W - estW - 20));
    const y = rv(40, Math.max(40, H - estH - 60));
    let coll = 0;
    for (const b of blocks) {
      const bw = (b.lines[0]?.length || 0) * CW[b.font];
      const bh = b.lines.length * LH[b.font];
      if (x < b.x + bw && x + estW > b.x && y < b.y + bh && y + estH > b.y) coll++;
    }
    if (coll <= 1) return { x, y };
  }
  return { x: rv(40, Math.max(40, W - 200)), y: rv(40, Math.max(40, H - 100)) };
}

// floater :: una sola línea suelta — fórmula, kaomoji, ping o glosa-fragmento
function spawnFloater() {
  const types = [
    () => ({ text: pick(POOLS.formula),                    font: 'medium', color: 'dim',   life: 3.5 }),
    () => ({ text: pick(POOLS.kaomoji),                    font: 'large',  color: maybe(0.5) ? 'amber' : 'green', life: 2.2 }),
    () => ({ text: '[ ' + pick(POOLS.glosa).slice(0, 42) + ' ]', font: 'small', color: 'white', life: 3.0 }),
    () => ({ text: pick(POOLS.ping) + '  ·  ' + pick(POOLS.ping) + '  ·  ' + pick(POOLS.ping), font: 'small', color: 'dim', life: 2.5 }),
    () => ({ text: pick(POOLS.verbo) + '  ·  ' + pick(POOLS.adj),        font: 'medium', color: 'green', life: 3 }),
    () => ({ text: pick(POOLS.epoch),                      font: 'medium', color: maybe(0.4) ? 'white' : 'dim', life: 3.5 }),
  ];
  const opt = pick(types)();
  const cw  = CW[opt.font];
  const estW = (opt.text.length || 1) * cw;
  const x = rv(20, Math.max(20, W - estW - 20));
  const y = rv(40, Math.max(40, H - 100));
  blocks.push(new Block({
    lines: [opt.text], x, y,
    font: opt.font, color: opt.color,
    life: opt.life + Math.random() * 1.2,
    typeSpeed: 220,
    kind: 'floater',
    glitch: scene.glitch * 0.3,
  }));
}

function spawnGhostBackground() {
  const lines = genDiagram();
  const font  = maybe(0.4) ? 'large' : 'medium';
  const cw    = CW[font], lh = LH[font];
  const estW  = Math.max(...lines.map(l => l.length)) * cw;
  const x     = Math.max(20, (W - estW) / 2 + rv(-100, 100));
  const y     = Math.max(40, (H - lines.length * lh) / 2 + rv(-80, 80));
  blocks.push(new Block({
    lines, x, y,
    font, color: 'ghost',
    life: 18 + Math.random() * 10,
    typeSpeed: 25,
    kind: 'ghost',
  }));
}

// =============================================================
//   SCHEDULER + LOOP
// =============================================================

function startScene(name) {
  scene = SCENES[name] || SCENES.terminal;
  sceneT = 0;
  sceneDur = scene.dur[0] + Math.random() * (scene.dur[1] - scene.dur[0]);
  acc.diag = acc.tick = acc.cita = acc.drop = 0;
  if (AUDIO.ready) Tone.Transport.bpm.rampTo(percBpm(), 0.8);
  if (scene.ghostBg && Math.random() < 0.65) spawnGhostBackground();
}

function tickScheduler(dt) {
  if (muted) return;
  const t = dt * tempo;
  sceneT += dt;
  if (sceneT >= sceneDur) {
    const others = SCENE_LIST.filter(s => s !== scene.name);
    startScene(pick(others));
  }
  const aliveDiag = blocks.filter(b => b.kind === 'diag').length;
  acc.diag += t;
  if (acc.diag >= 1 / Math.max(0.01, scene.diagRate) && aliveDiag < scene.maxDiag) {
    acc.diag = 0;
    spawnDiagram();
  }
  acc.tick += t;
  if (acc.tick >= 1 / Math.max(0.01, scene.tickerRate)) {
    acc.tick = 0;
    spawnTicker();
  }
  acc.cita += t;
  if (scene.citaRate > 0 && acc.cita >= 1 / scene.citaRate) {
    acc.cita = 0;
    spawnCita();
  }
  acc.drop += t;
  if (scene.bigDropRate > 0 && acc.drop >= 1 / scene.bigDropRate) {
    acc.drop = 0;
    spawnDrop();
  }
  acc.floater += t;
  const fRate = scene.floaterRate ?? 0.20;
  if (fRate > 0 && acc.floater >= 1 / fRate) {
    acc.floater = 0;
    spawnFloater();
  }
  if (scene.ghostBg && Math.random() < 0.0008 * tempo) spawnGhostBackground();
}

function render() {
  // fade-trail: rastros decaen suaves frame a frame
  ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
  ctx.fillRect(0, 0, W, H);

  // ordenar para que ghost vaya al fondo
  blocks.sort((a, b) => {
    const order = { ghost: 0, burst: 1, ticker: 2, floater: 2.5, diag: 3, glosa: 4, cita: 5, drop: 6 };
    return (order[a.kind] || 3) - (order[b.kind] || 3);
  });
  for (const b of blocks) b.draw();

  // HUD inferior derecha
  ctx.font = FONTS.micro;
  ctx.fillStyle = colorFor('dim', 0.85);
  const fps = (1 / Math.max(0.001, lastDt)).toFixed(0);
  const snd = !AUDIO.ready ? '♪ —'
            : !AUDIO.enabled ? '♪ off'
            : (AUDIO.perc ? '♪+perc' : '♪');
  const hud = `[${scene.name}]  ${TYPEFACES[typeIdx]}  tempo=${tempo.toFixed(2)}x  blocks=${blocks.length}  ${fps}fps  ·  ${snd}${muted ? '  ·  MUTED' : ''}`;
  ctx.fillText(hud, W - hud.length * CW.micro - 14, H - 12);
}

function update(dt) {
  for (const b of blocks) b.update(dt);
  blocks = blocks.filter(b => b.alive);
}

function loop(ts) {
  if (lastTs === null) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.06);
  lastTs = ts;
  lastDt = dt;
  T += dt;

  tickScheduler(dt);
  update(dt);
  render();

  requestAnimationFrame(loop);
}

// =============================================================
//   VJ CONTROLS
// =============================================================

window.addEventListener('keydown', e => {
  initAudio();
  if (e.key === ' ')      { e.preventDefault(); spawnDrop(); return; }
  if (e.key === 's' || e.key === 'S') { toggleSound(); return; }
  if (e.key === 'p' || e.key === 'P') { AUDIO.perc = !AUDIO.perc; return; }
  if (e.key === 't' || e.key === 'T') { applyTypeface(typeIdx + 1); return; }
  if (e.key === 'm' || e.key === 'M') { muted = !muted; return; }
  if (e.key === 'r' || e.key === 'R') { blocks = []; return; }
  if (e.key === 'f' || e.key === 'F') { for (let i = 0; i < 6; i++) spawnFloater(); return; }
  if (e.key === '+' || e.key === '=') { tempo = Math.min(4, tempo * 1.25); syncPercTempo(); return; }
  if (e.key === '-' || e.key === '_') { tempo = Math.max(0.1, tempo / 1.25); syncPercTempo(); return; }
  if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key, 10) - 1;
    if (idx < SCENE_LIST.length) startScene(SCENE_LIST[idx]);
    return;
  }
});

canvas.addEventListener('click', () => { initAudio(); spawnDrop(); });

// =============================================================
//   ARRANQUE
// =============================================================

startScene('terminal');
requestAnimationFrame(loop);

</script>
</body>
