<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>circuito.live — v7</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; overflow: hidden; height: 100%; cursor: crosshair; }
    canvas { display: block; }
    #hint {
      position: fixed; bottom: 8px; left: 12px;
      color: rgba(0, 200, 60, 0.40);
      font: 11px/1.4 'Courier New', monospace;
      letter-spacing: 0.5px;
      pointer-events: none;
      text-shadow: 0 0 6px rgba(0, 255, 65, 0.4);
    }
    #hint kbd {
      display: inline-block; padding: 1px 5px;
      border: 1px solid rgba(0, 200, 60, 0.4);
      border-radius: 2px;
      margin: 0 1px;
    }
    /* tipografías oldschool CP437 — viven en aisentencesondigitalart/ */
    @font-face { font-family:'SperryPC';        src:url(../../aisentencesondigitalart/Px437_SperryPC_8x16.ttf);    font-display:swap; }
    @font-face { font-family:'Robotron';        src:url(../../aisentencesondigitalart/Px437_Robotron_A7100.ttf);   font-display:swap; }
    @font-face { font-family:'OlivettiThin';    src:url(../../aisentencesondigitalart/Px437_OlivettiThin_8x16.ttf);font-display:swap; }
    @font-face { font-family:'SiemensPCD';      src:url(../../aisentencesondigitalart/Px437_Siemens_PC-D.ttf);     font-display:swap; }
    @font-face { font-family:'ApricotPortable'; src:url(../../aisentencesondigitalart/Px437_ApricotPortable.ttf);  font-display:swap; }
    @font-face { font-family:'Compis';          src:url(../../aisentencesondigitalart/Px437_Compis.ttf);           font-display:swap; }
    @font-face { font-family:'IBM_Model3x';     src:url(../../aisentencesondigitalart/Px437_IBM_Model3x_Alt3.ttf); font-display:swap; }
    @font-face { font-family:'IBM_PS55';        src:url(../../aisentencesondigitalart/Px437_IBM_PS-55_re.ttf);     font-display:swap; }
    @font-face { font-family:'Stingray';        src:url(../../aisentencesondigitalart/Px437_CL_Stingray_8x19.ttf); font-display:swap; }
    @font-face { font-family:'ToshibaSat';      src:url(../../aisentencesondigitalart/PxPlus_ToshibaSat_8x14.ttf); font-display:swap; }
    @font-face { font-family:'HP150';           src:url(../../aisentencesondigitalart/PxPlus_HP_150_re.ttf);       font-display:swap; }
    @font-face { font-family:'Paradise132';     src:url(../../aisentencesondigitalart/Px437_Paradise132_7x9.ttf);  font-display:swap; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">
  <kbd>SPACE</kbd> drop · <kbd>1-9</kbd> escena · <kbd>+/-</kbd> tempo · <kbd>M</kbd> pausa · <kbd>R</kbd> reset · <kbd>F</kbd> floater · <kbd>S</kbd> sonido · <kbd>P</kbd> perc · <kbd>T</kbd> tipo
</div>
<script src="tone.js"></script>
<script type="module" src="audio.js"></script>
<script type="module" src="content.js"></script>
  <script type="module" src="engine.js"></script>
<script>

</script>
</body>
</html>
