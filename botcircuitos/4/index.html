function pick(a)   { return a[Math.random() * a.length | 0]; }
function rv(a, b)  { return (Math.random() * (b - a) + a) | 0; }
function rf(a, b)  { return +(Math.random() * (b - a) + a).toFixed(1); }
function maybe(p)  { return Math.random() < p; }

}

// ── GRAMÁTICA DE TOPOLOGÍAS ───────────────────────────────────
function nodoSerie(hijos)     { return { tipo:'serie', hijos }; }
function nodoParalelo(ramas)  { return { tipo:'paralelo', ramas }; }
function nodoComponente(comp) { return { tipo:'comp', comp }; }

function genTopologia(prof) {
  if (prof <= 0 || Math.random() < 0.35) return nodoComponente(pick(COMP_POOL)());
  if (Math.random() < 0.55) {
    return nodoSerie(Array.from({length:rv(2,4)}, () => genTopologia(prof-1)));
  } else {
    return nodoParalelo(Array.from({length:rv(2,3)}, () => genTopologia(prof-1)));
  }
}

function renderNodo(nodo) {
  if (nodo.tipo === 'comp') {
    const w = `──[${nodo.comp.label}]──`;
    return { lineas:[w], ancho:w.length, alto:1, comps:[nodo.comp] };
  }
  if (nodo.tipo === 'serie') {
    const partes = nodo.hijos.map(renderNodo);
    const alto = Math.max(...partes.map(p => p.alto));
    const comps = partes.flatMap(p => p.comps||[]);
    const cols = partes.map(p => {
      const pt = Math.floor((alto-p.alto)/2);
      const pb = alto-p.alto-pt;
      return [...Array(pt).fill('─'.repeat(p.ancho)), ...p.lineas, ...Array(pb).fill('─'.repeat(p.ancho))];
    });
    const lineas = Array.from({length:alto}, (_,r) => cols.map(c=>c[r]||'').join(''));
    return { lineas, ancho:lineas[0]?.length||0, alto, comps };
  }
  if (nodo.tipo === 'paralelo') {
    const partes = nodo.ramas.map(renderNodo);
    const ancho = Math.max(...partes.map(p => p.ancho));
    const comps = partes.flatMap(p => p.comps||[]);
    const lineas = ['┌'+'─'.repeat(ancho)+'┐'];
    partes.forEach((p,i) => {
      const pl = Math.floor((ancho-p.ancho)/2);
      const pr = ancho-p.ancho-pl;
      p.lineas.forEach(l => lineas.push('│'+' '.repeat(pl)+l+' '.repeat(pr)+'│'));
      if (i < partes.length-1) lineas.push('├'+'─'.repeat(ancho)+'┤');
    });
    lineas.push('└'+'─'.repeat(ancho)+'┘');
    return { lineas, ancho:ancho+2, alto:lineas.length, comps };
  }
}

// ── ANÁLISIS ──────────────────────────────────────────────────
function analizarCircuito(comps, vcc) {
  const filt = sym => comps.filter(c => c.sym === sym);
  const Rs = filt('R'), Cs = filt('C'), Ls = filt('L');
  const Ms = filt('M'), Xs = filt('X'), Ss = filt('S'), Ns = filt('N');
  const Bs = filt('B'), Ys = filt('Y'), As = filt('A');
  const leds = comps.filter(c => c.fn && c.fn.includes('nm'));
  const out  = [`  FUENTE     :  Vcc = ${vcc}V`];
  if (Bs.length) out.push(`  BATERÍA    :  ${Bs[0].label}  (paralela a Vcc)`);
  if (Ss.length) {
    const p = (Ss[0].valor * 200 / 1000).toFixed(2);
    out.push(`  SOLAR      :  Voc=${Ss[0].valor}V   P_max ≈ ${p}W   η ≈ 20%`);
  }
  if (Rs.length) {
    const Rt = Rs.reduce((s,r)=>s+r.valor,0);
    out.push(`  R total    =  ${Rt}Ω   I = ${(vcc/Rt*1000).toFixed(2)}mA   P = ${(vcc*vcc/Rt*1000).toFixed(1)}mW`);
  }
  if (Cs.length && Rs.length) {
    const R=Rs[0].valor, C=Cs[0].valor;
    out.push(`  τ = RC     =  ${(R*C/1e9).toFixed(4)}s   f-3dB = ${(1/(2*Math.PI*R*C/1e9)).toFixed(1)}Hz`);
  }
  if (Ls.length && Cs.length) {
    const L=Ls[0].valor/1000, C=Cs[0].valor/1e6;
    out.push(`  f₀ LC      =  ${(1/(2*Math.PI*Math.sqrt(L*C))).toFixed(2)}Hz   ← resonancia`);
  }
  if (Xs.length) {
    out.push(`  RELOJ      :  f₀ = ${Xs[0].valor}Hz   jitter ≈ 10 ppm   (cuarzo)`);
  }
  if (Ns.length) {
    out.push(`  555 ASTABLE:  f ≈ ${Ns[0].valor}Hz   duty ≈ 50-66%   chronos puro`);
  }
  if (Ms.length) {
    out.push(`  MEMRISTOR  :  M = ${Ms[0].valor}Ω   ((la materia recuerda))`);
  }
  if (As.length) {
    out.push(`  OP-AMP     :  Aol = ${As[0].valor}dB   ((virtual ground habita aquí))`);
  }
  if (Ys.length) {
    out.push(`  ANTENA     :  f = ${Ys[0].valor}MHz   λ/2 disponible   R_rad ≈ 73Ω`);
  }
  leds.forEach(l => {
    const R = Rs[0]?.valor || 220;
    out.push(`  LED        :  ${l.fn}   If ≈ ${((vcc-l.valor)/R*1000).toFixed(1)}mA`);
  });
  out.push(`  nodos      =  ${comps.length}   ramas ≈ ${Math.ceil(comps.length/2)}`);
  return out.join('\n');
}

  if (!comps.length) comps = [resistor()];

    'GND no es el final · es la referencia · el cero compartido',
    '(○_○) toda señal mide en relación a alguien que no se mueve',
    'Bruno Latour: todo dato es un montaje · GND es el primero',
    '>> common reference // social contract // 0V',
    '⏚ la tierra es donde acordamos no preguntar más.',
  ]},
  luz: { topic: 'FOTÓN / LUZ', lines: [
    'Maxwell · 1865: ondas electromagnéticas · la luz como una de ellas',
    '(☀_☀) E = h·f · cada fotón es un quantum de presencia',
    'el LED no se enciende: emite — un sustantivo se vuelve verbo',
    '>> 625nm rojo · 520nm verde · 470nm azul · todos juntos: blanco',
    '∿ ver es recibir señales que partieron sin destinatario',
  ]},
  sonido: { topic: 'SONIDO / TRANSDUCCIÓN', lines: [
    'el piezo · el micrófono: dos formas de traducir entre dominios',
    'Pauline Oliveros: deep listening = saber qué dejar pasar',
    '(˃ᴗ˂) presión → voltaje → presión → tímpano → memoria',
    '>> todo audio es trauma traducido en impedancia',
    '♪ Hertz portátil · el aire como soporte temporal del sentido',
  ]},
};

function pickGlosa(comps) {
  const has = sym => comps.some(c => c.sym === sym);
  const hasNm = comps.some(c => c.fn && c.fn.includes('nm'));

  if (has('L') && has('C')) return GLOSAS.resonancia;
  if (has('M')) return GLOSAS.memoria;
  if (has('Y')) return GLOSAS.onda;
  if (has('X') || has('N')) return GLOSAS.tiempo;
  if (has('Q') || has('A') || has('Z')) return GLOSAS.amplificacion;
  if (hasNm) return GLOSAS.luz;
  if (has('P') || has('U')) return GLOSAS.sonido;
  if (has('D') && !has('Q')) return GLOSAS.decision;
  if (has('B') || has('S')) return GLOSAS.fuente;
  if (has('R') && !has('C') && !has('L')) return GLOSAS.disipacion;
  return pick([GLOSAS.gramatica, GLOSAS.tierra, GLOSAS.gramatica]);
}

// ── TAGS ────────────────────────────────────────────────────
const TAG_POOL = [
  'circuito', 'señal', 'vibe', 'ruido', 'silencio', 'fase',
  'kittler', 'bergson', 'chua', 'oliveros', 'flusser',
  'analog', 'digital', 'biestable', 'asintótico', 'estocástico',
  'medios', 'gramática', 'glitch', 'feedback', 'impedancia',
];

function hashtags(vcc) {
  const n = rv(3, 5);
  const sel = [...TAG_POOL].sort(()=>Math.random()-0.5).slice(0, n);
  return [`#circuito`, `#${vcc}v`, ...sel.map(t=>'#'+t)].slice(0, 5).join(' ');
}

// ── GENERADOR PRINCIPAL ─────────────────────────────────────
function generar() {
  const vcc    = pick([3.3, 5, 9, 12, 15, 24]);
  const prof   = rv(1, 3);
  const arbol  = genTopologia(prof);
  const render = renderNodo(arbol);
  const comps  = render.comps || [];
  const id     = Math.random().toString(36).slice(2,7).toUpperCase();
  const ts     = new Date().toISOString().slice(11,19);
  const glosa  = pickGlosa(comps);
  const status = pick(STATUS_LINES)();
  const tags   = hashtags(vcc);

  const out = [
    `> GRAMÁTICA DE CIRCUITOS — GEN #${id}   ${ts}`,
    `  profundidad=${prof}   nodos=${comps.length}   Vcc=${vcc}V`,
    `  tags: ${tags}`,
    ``,
    `╔══════════════════════════════════════════════════╗`,
    `║  TOPOLOGÍA GENERADA                              ║`,
    `╚══════════════════════════════════════════════════╝`,
    ``,
    `  (+${vcc}V)`,
    `   │`,
    ...render.lineas.map(l => `  ${l}`),
    `   │`,
    `  GND`,
    ``,
    `  ───────────────────────────────────────────────`,
    `  ANÁLISIS`,
    analizarCircuito(comps, vcc),
    `  ───────────────────────────────────────────────`,
    ``,
    `  POEMA  ▶  versos cruzados`,
    `    ` + poetaCircuito(comps.length > 0 ? comps : [resistor()]),
    ``,
    `  ${status}`,
    ...(maybe(0.55) ? ['', pick(STICKERS)] : []),
    ``,
    `  ───────────────────────────────────────────────`,
    `  GLOSA  ▶  ${glosa.topic}`,
    ...glosa.lines.map(l => '    ' + l),
    `  ───────────────────────────────────────────────`,
    ``,
    ...(comps.length > 0 ? [
      `  COMPONENTES:`,
      ...comps.map(c => `    ${c.sym}  ${c.label.padEnd(26)}  ${c.fn}`),
    ] : []),
    ``,
    `  [click · space · enter]  →  nuevo circuito`,
  ].join('\n');

  return out;
}

// ── TYPEWRITER ──────────────────────────────────────────────
let rafId = null;
let targetText = '', displayText = '', charIdx = 0;

function typewrite(text) {
  if (rafId) cancelAnimationFrame(rafId);
  targetText = text; displayText = ''; charIdx = 0;
  function step() {
    for (let i = 0; i < 6 && charIdx < targetText.length; i++) displayText += targetText[charIdx++];
    document.getElementById('out').textContent = displayText;
    if (charIdx < targetText.length) rafId = requestAnimationFrame(step);
  }
  rafId = requestAnimationFrame(step);
}

function start() { typewrite(generar()); }
window.onload = start;
document.addEventListener('click', start);
document.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') start(); });
</script>
