  return { title: 'RECTIFICADOR PUENTE вҖ” convertir el deseo en compromiso', schematic, lineal, analisis, glosa: 'rectifier' };

// в”Җв”Җ TYPEWRITER в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

let rafId = null;
let target = '', shown = '', idx = 0;

function typewrite(text) {
  if (rafId) cancelAnimationFrame(rafId);
  target = text; shown = ''; idx = 0;
  const out = document.getElementById('out');
  out.textContent = '';
  function step() {
    for (let i = 0; i < 4 && idx < target.length; i++) shown += target[idx++];
    out.textContent = shown;
    if (idx < target.length) rafId = requestAnimationFrame(step);
  }
  rafId = requestAnimationFrame(step);
}

function start() { typewrite(generar()); }

window.onload = start;
document.addEventListener('click', start);
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') start();
});
