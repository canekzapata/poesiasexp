// ─── init / build ─────────────────────────────────────────────────

function init() {

  mode    = pieza.mode;

  waveX = boxL - 1;
  hideX = boxL - 1;

  holdT = 0;
  spawnEquations();

function putLabel(c, r, text, kind) {
  for (let k = 0; k < text.length; k++) {
    const cc = c + k;
    if (cc < 0 || cc >= COLS) continue;
    SCH[r][cc] = { ch: text[k], kind };
  }
}

function buildSchematic() {
  const padX = 3;
  const maxLen = Math.max(...lines.map(l => l.length));
  boxL = Math.max(2,        Math.floor((COLS - maxLen) / 2) - padX);
  boxR = Math.min(COLS - 3, boxL + maxLen + 2 * padX);

  const startRow = Math.max(VCC_ROW + 3, Math.floor((ROWS - lines.length) / 2));

  lineInfo = [];
  for (let i = 0; i < lines.length; i++) {
    const r = startRow + i;
    const text = lines[i];
    const isEmpty = text.length === 0;
    const cStart = Math.floor((COLS - text.length) / 2);
    const cEnd   = cStart + text.length - 1;
    const li = { r, cStart, cEnd, text, isEmpty, comps: [] };
    if (!isEmpty) {
      const leftEnd = boxL - 1;
      if (leftEnd > 8) {
        const t  = COMP_TYPES[(i * 5 + 1) % COMP_TYPES.length];
        const g  = COMP_GLYPHS[t];
        const cs = Math.max(2, Math.floor(leftEnd * 0.45) - (g.length >> 1));
        if (cs + g.length <= cStart - 1) li.comps.push({ cStart: cs, glyph: g, type: t });
      }
      const rightBeg = boxR + 1;
      if (COLS - rightBeg > 8) {
        const t  = COMP_TYPES[(i * 7 + 3) % COMP_TYPES.length];
        const g  = COMP_GLYPHS[t];
        const cs = Math.min(COLS - g.length - 2, rightBeg + Math.floor((COLS - rightBeg) * 0.55) - (g.length >> 1));
        if (cs >= cEnd + 2) li.comps.push({ cStart: cs, glyph: g, type: t });
      }
    }
    lineInfo.push(li);
  }
  for (let i = 0; i < lineInfo.length; i++) {
    if (lineInfo[i].isEmpty) continue;
    lineInfo[i].up = false; lineInfo[i].down = false;
    for (let j = i - 1; j >= 0; j--)              if (!lineInfo[j].isEmpty) { lineInfo[i].up = true;   break; }
    for (let j = i + 1; j < lineInfo.length; j++) if (!lineInfo[j].isEmpty) { lineInfo[i].down = true; break; }
  }

  SCH = new Array(ROWS);
  for (let r = 0; r < ROWS; r++) SCH[r] = new Array(COLS).fill(null);

  // vertical buses
  for (let bi = 0; bi < VBUSES.length; bi++) {
    const c = VBUSES[bi];
    for (let r = VCC_ROW + 1; r < GND_ROW; r++) {
      SCH[r][c] = { ch:'│', kind:'vbus', busIdx:bi };
    }
  }
  // VCC and GND horizontal rails
  for (let c = 0; c < COLS; c++) {
    SCH[VCC_ROW][c] = { ch:'─', kind:'vcc' };
    SCH[GND_ROW][c] = { ch:'═', kind:'gnd' };
  }
  // junctions at bus / rail crossings
  for (let bi = 0; bi < VBUSES.length; bi++) {
    SCH[VCC_ROW][VBUSES[bi]] = { ch:'┬', kind:'bus-junction' };
    SCH[GND_ROW][VBUSES[bi]] = { ch:'┴', kind:'bus-junction' };
  }
  // labels
  putLabel(2, VCC_ROW, '+Vcc',  'label');
  putLabel(2, GND_ROW, ' GND ', 'label');
  putLabel(COLS - 14, VCC_ROW, `[${mode}]`, 'label');

  // verse module overrides previous geometry
  for (let i = 0; i < lineInfo.length; i++) {
    const li = lineInfo[i];
    if (li.isEmpty) continue;
    if (li.r < 0 || li.r >= ROWS) continue;

    for (let c = 0; c < COLS; c++) {
      const ex = SCH[li.r][c];
      if (ex && ex.kind === 'vbus') SCH[li.r][c] = { ch:'┼', kind:'cross', lineIdx:i, busIdx:ex.busIdx };
      else                          SCH[li.r][c] = { ch:'─', kind:'rail',  lineIdx:i };
    }
    for (let k = 0; k < li.text.length; k++) {
      const c = li.cStart + k;
      if (c < 0 || c >= COLS) continue;
      const ch = li.text[k];
      if (ch === ' ') SCH[li.r][c] = { ch:'─', kind:'verse-space', lineIdx:i };
      else            SCH[li.r][c] = { ch,    kind:'verse',       lineIdx:i };
    }
    for (const cp of li.comps) {
      for (let k = 0; k < cp.glyph.length; k++) {
        const c = cp.cStart + k;
        if (c < 0 || c >= COLS) continue;
        SCH[li.r][c] = { ch: cp.glyph[k], kind:'comp', lineIdx:i, type: cp.type };
      }
    }
    const u = li.up, d = li.down;
    for (const c of [boxL, boxR]) {
      if (c < 0 || c >= COLS) continue;
      const isL = (c === boxL);
      let jch = null;
      if (u && d) jch = isL ? '├' : '┤';
      else if (d) jch = isL ? '┌' : '┐';
      else if (u) jch = isL ? '└' : '┘';
      if (jch) SCH[li.r][c] = { ch: jch, kind:'junction', lineIdx:i };
    }
    let next = -1;
    for (let j = i + 1; j < lineInfo.length; j++) if (!lineInfo[j].isEmpty) { next = j; break; }
    if (next >= 0) {
      for (let r = li.r + 1; r < lineInfo[next].r; r++) {
        if (r < 0 || r >= ROWS) continue;
        for (const c of [boxL, boxR]) {
          if (c < 0 || c >= COLS) continue;
          const ex = SCH[r][c];
          if (ex && ex.kind === 'vbus') SCH[r][c] = { ch:'┼', kind:'cross-bajante', busIdx:ex.busIdx };
          else SCH[r][c] = { ch:'│', kind:'bajante' };
        }
      }
    }
  }
  for (let bi = 0; bi < VBUSES.length; bi++) {
    SCH[VCC_ROW][VBUSES[bi]] = { ch:'●', kind:'via' };
    SCH[GND_ROW][VBUSES[bi]] = { ch:'●', kind:'via' };
  }
}

// ─── equations ────────────────────────────────────────────────────

function findFreeSpot(textLen) {
  for (let tries = 0; tries < 50; tries++) {
    const r = Math.floor(Math.random() * (ROWS - 10)) + 4;
    const c = Math.floor(Math.random() * (COLS - textLen - 4)) + 2;
    let ok = true;
    for (let k = -1; k <= textLen; k++) {
      const cc = c + k;
      if (cc < 0 || cc >= COLS) { ok = false; break; }
      if (SCH[r] && SCH[r][cc]) { ok = false; break; }
      if (SCH[r-1] && SCH[r-1][cc]) { ok = false; break; }
      if (SCH[r+1] && SCH[r+1][cc]) { ok = false; break; }
    }
    if (lineInfo.some(li => !li.isEmpty && Math.abs(r - li.r) <= 1)) ok = false;
    if (ok) return { c, r };
  }
  return null;
}

function spawnEquations() {
  equationLabels = [];
  const eqs = pieza.equations || [];
  for (const text of eqs) {
    const spot = findFreeSpot(text.length);
    if (spot) {
      equationLabels.push({
        text, c: spot.c, r: spot.r,
        t0: T - Math.random() * 2,
        life: 6 + Math.random() * 5,
      });
    }
  }
}

// ─── physics helpers ──────────────────────────────────────────────

function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }

// matrix-green escalado por intensidad (era greyscale)
// #00ff41 = rgb(0, 255, 65)
function grey(v) {
  const a = Math.max(0, Math.min(1, v));
  return `rgb(0, ${Math.round(a * 255)}, ${Math.round(a * 65)})`;
}

function energyAt(c) {
  if (phase === 'reveal') {
    const d = waveX - c;
    if (d < 0) return 0;
    if (d > FADE_COLS) return 1;
    return d / FADE_COLS;
  } else if (phase === 'hold') {
    return 1;
  } else {
    const d = hideX - c;
    if (d < 0) return 1;
    if (d > FADE_COLS) return 0;
    return 1 - d / FADE_COLS;
  }
}

// override de pulso por modo. devuelve null para usar el comportamiento default.
function modePulseOverride(c, lineIdx, t) {
  if (mode === 'stationary') {
    const x = c / Math.max(1, COLS);
    const beta = 2 * Math.PI * 1.7;
    const G = 0.7;
    const env = Math.sqrt(1 + G*G + 2*G*Math.cos(2*beta*x)) / (1 + G);
    return env * (0.55 + 0.35 * Math.sin(t * 1.2 + lineIdx));
  }
  if (mode === 'integrator') {
    const tcycle = 7;
    const ph = ((t - initT) % tcycle) / tcycle;
    const xn = c / Math.max(1, COLS);
    return xn < ph ? Math.min(1, 0.3 + ph * 0.8) : 0;
  }
  if (mode === 'buck') {
    const bins = 7;
    const bin = Math.floor(c * bins / Math.max(1, COLS));
    const D = 0.45;
    const phaseLocal = ((t * modeCfg.busSpeed * 0.25 + bin * 0.32) % 1 + 1) % 1;
    return phaseLocal < D ? 1.0 : 0.0;
  }
  if (mode === 'pll') {
    const conv = clamp((t - initT) / 6, 0, 1);
    const period = COLS + 40;
    const phaseOff = (lineIdx * 23) * (1 - conv);
    const pos = ((t * modeCfg.pulseSpeed + phaseOff) % period + period) % period - 20;
    const dx = c - pos;
    if (dx > 1) return 0;
    return Math.max(0, 1 + dx / modeCfg.pulseTrail);
  }
  return null;
}

function pulseAt(c, lineIdx, t) {
  const li = lineInfo[lineIdx];
  if (!li || li.isEmpty) return 0;
  const ov = modePulseOverride(c, lineIdx, t);
  if (ov !== null) return ov;
  const speed    = modeCfg.sync ? modeCfg.pulseSpeed : modeCfg.pulseSpeed * (0.85 + 0.12 * lineIdx);
  const phaseOff = modeCfg.sync ? 0 : lineIdx * 7;
  const period   = COLS + 40;
  const pos      = ((t * speed + phaseOff) % period + period) % period - 20;
  const dx       = c - pos;
  let v = 0;
  if (modeCfg.square)              v = (dx > -1.5 && dx < 0.5) ? 1 : 0;
  else if (dx <= 1)                v = Math.max(0, 1 + dx / modeCfg.pulseTrail);
  if (modeCfg.gain > 1) {
    const f = 0.3 + 0.7 * (c / COLS);
    v *= Math.min(modeCfg.gain, 1 + (modeCfg.gain - 1) * f);
  }
  return v;
}

function busPulseH(c, t, rowIdx) {
  if (modeCfg.busSpeed === 0) return 0;
  const speed  = modeCfg.busSpeed * (rowIdx === 0 ? 1 : -1);
  const period = COLS + 40;
  const flow   = ((t * speed) % period + period * 2) % period;
  const pos    = flow - 20;
  const dx     = c - pos;
  if (Math.abs(dx) > 16) return 0;
  if (dx > 1) return 0;
  return Math.max(0, 1 + dx / 10);
}

function busPulseV(r, t, busIdx) {
  if (modeCfg.busSpeed === 0) return 0;
  const speed  = modeCfg.busSpeed * 0.7 * (busIdx % 2 === 0 ? 1 : -1);
  const period = ROWS + 24;
  const flow   = ((t * speed + busIdx * 9) % period + period * 2) % period;
  const pos    = flow - 12;
  const dy     = r - pos;
  if (dy > 1) return 0;
  return Math.max(0, 1 + dy / 8);
}

function modeModulate(ch, baseA, lineIdx, t) {
  if (mode === 'clock' && (ch === '■' || ch === '□')) {
    const k = (Math.floor(t * 4) + ch.charCodeAt(0)) % 2 === 0;
    return baseA * (k ? 1.0 : 0.30);
  }
  if (mode === 'buck' && (ch === '▓' || ch === '░')) {
    const k = (Math.floor(t * 5) + ch.charCodeAt(0)) % 2 === 0;
    return baseA * (k ? 1.0 : 0.28);
  }
  if (mode === 'cap') {
    const li = lineInfo[lineIdx];
    if (li && li.text.indexOf('┤├') >= 0) {
      const p = (Math.sin(t * 4) + 1) / 2;
      return baseA * (0.55 + 0.45 * p);
    }
  }
  if (mode === 'memristor' && (ch === '⊟' || ch === 'M')) {
    return baseA * (0.55 + 0.45 * Math.sin(t * 1.5 + lineIdx));
  }
  if (mode === 'schmitt') {
    const k = Math.floor(t * 0.8 + lineIdx) % 2 === 0;
    return baseA * (k ? 1.0 : 0.45);
  }
  if (mode === 'pll') {
    const conv = clamp((t - initT) / 6, 0, 1);
    return baseA * (0.5 + 0.5 * conv + 0.15 * Math.sin(t * 2 * (1 - conv)));
  }
  if (mode === 'stationary') {
    return baseA * (0.6 + 0.4 * Math.sin(t * 1.3 + lineIdx * 0.5));
  }
  if (mode === 'integrator') {
    const ph = ((t - initT) % 7) / 7;
    return baseA * (0.4 + 0.6 * ph);
  }
  if (mode === 'noise')    return baseA * (0.55 + 0.45 * Math.random());
  if (mode === 'antenna')  return baseA * (0.7 + 0.3 * Math.sin(t * 1.8));
  if (mode === 'fotones')  return baseA * (0.7 + 0.3 * Math.sin(t * 4 + lineIdx));
  if (mode === 'rect')     return baseA * (Math.abs(Math.sin(t * 2.5)) * 0.4 + 0.6);
  if (mode === 'modAM')    return baseA * (0.5 + 0.5 * (1 + 0.6*Math.cos(t * 0.8)) * Math.cos(t * 6)/2 + 0.25);
  if (mode === 'colpitts') return baseA * (0.6 + 0.4 * Math.sin(t * 4.5));
  if (mode === 'resonance')return baseA * (0.6 + 0.4 * Math.sin(t * 2.8));
  if (mode === 'amp')      return baseA * (0.75 + 0.25 * Math.sin(t * 1.5 + lineIdx));
  if (mode === 'silence')  return baseA * 0.78;
  return baseA;
}

// ─── cursor ───────────────────────────────────────────────────────

canvas.addEventListener('mousemove', e => {
  mx = Math.floor(e.clientX / CW);
  my = Math.floor(e.clientY / LH);
});
canvas.addEventListener('mouseleave', () => { mx = -1; my = -1; });

canvas.addEventListener('click', e => {
  const cx = Math.floor(e.clientX / CW);
  const cy = Math.floor(e.clientY / LH);
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist  = Math.random() * 10;
    const dc = (Math.cos(angle) * dist) | 0;
    const dr = (Math.sin(angle) * dist * 0.5) | 0;
    sparkEvents.push({ c: cx + dc, r: cy + dr, t0: T, life: 0.4 + Math.random() * 0.8 });
  }
});

// ─── ruido ambient ────────────────────────────────────────────────

const LET = "abcdefghijklmnopqrstuvwxyz";

function noiseValue(c, r, t) {
  let cc = c, rr = r;
  if (mx >= 0) {
    const dx = c - mx, dy = r - my;
    const d2 = dx*dx + dy*dy;
    if (d2 < 400) {
      const w = (1 - d2 / 400) * 0.5;
      cc += dx * w; rr += dy * w;
    }
  }
  // drift más vivo: antes era t*0.4 y t*0.27 — se sentía estático
  return (Math.sin(cc * 0.21 + rr * 0.13 + t * 1.1) *
          Math.cos(cc * 0.09 - rr * 0.17 + t * 0.75) + 1) / 2;
}

const SUB_GLYPHS = '·∘°⋅';
function drawSubstrate(t) {
  for (let r = VCC_ROW + 2; r < GND_ROW - 1; r += 2) {
    for (let c = 2; c < COLS - 2; c += 3) {
      if (SCH[r] && SCH[r][c]) continue;
      // shimmer en olas suaves + drift de glyph para que el grid respire
      const wave  = (Math.sin(c * 0.18 + r * 0.13 + t * 1.4) + 1) / 2;
      const wave2 = (Math.cos(c * 0.07 - r * 0.21 + t * 0.9) + 1) / 2;
      const a     = 0.04 + 0.13 * wave * wave2;
      if (a < 0.045) continue;
      const gi = ((c * 5 + r * 3 + (t * 1.5 | 0)) % SUB_GLYPHS.length + SUB_GLYPHS.length) % SUB_GLYPHS.length;
      ctx.fillStyle = grey(a);
      ctx.fillText(SUB_GLYPHS[gi], c * CW, r * LH);
    }
  }
}

function drawNoise(t) {
  const gain = modeCfg.noiseGain;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (SCH[r][c]) continue;
      const v = noiseValue(c, r, t);
      if (v < 0.62) continue;
      const a = 0.08 * gain * ((v - 0.62) / 0.38);
      if (a < 0.02) continue;
      const idx = ((c * 3 + r * 7 + (t * 4 | 0)) % 26 + 26) % 26;
      ctx.fillStyle = grey(a);
      ctx.fillText(LET[idx], c * CW, r * LH);
    }
  }
}

// ─── mode overlays ────────────────────────────────────────────────

function drawModeOverlay(t) {
  if (mode === 'antenna')    drawRadials(t);
  if (mode === 'memristor')  drawMemoryTrail(t);
  if (mode === 'stationary') drawStandingEnvelope(t);
  if (mode === 'buck')       drawPwmStripes(t);
  if (mode === 'fotones')    drawPhotonRain(t);
  if (mode === 'noise')      drawHeavyStatic(t);
  if (mode === 'pll')        drawPllPhase(t);
  if (mode === 'modAM')      drawAmEnvelope(t);
}

function drawRadials(t) {
  if (Math.random() < 0.012) {
    radials.push({ c: COLS / 2 + (Math.random() - 0.5) * COLS * 0.3,
                   r: ROWS / 2 + (Math.random() - 0.5) * 4,
                   t0: t, life: 1.6 + Math.random() });
  }
  const kept = [];
  for (const ring of radials) {
    const age = t - ring.t0;
    if (age > ring.life) continue;
    kept.push(ring);
    const radius = age * 20;
    const alpha = (1 - age / ring.life) * 0.35;
    if (alpha < 0.04) continue;
    ctx.fillStyle = grey(alpha);
    const steps = Math.max(8, Math.floor(radius * 1.5));
    for (let i = 0; i < steps; i++) {
      const ang = (i / steps) * Math.PI * 2;
      const cc = Math.floor(ring.c + Math.cos(ang) * radius);
      const rr = Math.floor(ring.r + Math.sin(ang) * radius * 0.5);
      if (cc < 0 || cc >= COLS || rr < 0 || rr >= ROWS) continue;
      ctx.fillText('·', cc * CW, rr * LH);
    }
  }
  radials = kept;
}

function drawMemoryTrail(t) {
  if (mx >= 0 && Math.random() < 0.35) {
    memTrail.push({ c: mx, r: my, t0: t, life: 5 + Math.random() * 4 });
  }
  if (memTrail.length > 60) memTrail.shift();
  for (const m of memTrail) {
    const age = t - m.t0;
    if (age > m.life) continue;
    const alpha = (1 - age / m.life) * 0.45;
    if (alpha < 0.03) continue;
    ctx.fillStyle = grey(alpha);
    if (m.c >= 0 && m.c < COLS && m.r >= 0 && m.r < ROWS) {
      ctx.fillText('⊟', m.c * CW, m.r * LH);
    }
  }
}

function drawStandingEnvelope(t) {
  const r = Math.floor((VCC_ROW + GND_ROW) / 2) + 6;
  if (r < 0 || r >= ROWS) return;
  ctx.fillStyle = grey(0.16);
  const G = 0.7, beta = 2 * Math.PI * 1.7;
  for (let c = 0; c < COLS; c++) {
    const x = c / Math.max(1, COLS);
    const env = Math.sqrt(1 + G*G + 2*G*Math.cos(2*beta*x)) / (1 + G);
    const h = Math.floor(env * 4) + 1;
    for (let k = 0; k < h; k++) {
      const rr = r - k;
      if (rr < 0 || rr >= ROWS) continue;
      if (SCH[rr] && SCH[rr][c]) continue;
      const a = 0.12 * (1 - k / h);
      ctx.fillStyle = grey(a);
      ctx.fillText('∿', c * CW, rr * LH);
    }
  }
}

function drawPwmStripes(t) {
  const bins = 7;
  for (let bin = 0; bin < bins; bin++) {
    const phase = ((t * modeCfg.busSpeed * 0.25 + bin * 0.32) % 1 + 1) % 1;
    if (phase >= 0.45) continue;
    const c0 = Math.floor(bin * COLS / bins);
    const c1 = Math.floor((bin + 1) * COLS / bins);
    ctx.fillStyle = grey(0.07);
    for (let c = c0; c < c1; c += 2) {
      for (let r = VCC_ROW + 1; r < GND_ROW; r += 2) {
        if (SCH[r] && SCH[r][c]) continue;
        ctx.fillText('▓', c * CW, r * LH);
      }
    }
  }
}

function drawPhotonRain(t) {
  const PH = '·•*∗⋆';
  if (Math.random() < 0.4) {
    sparkEvents.push({
      c: Math.floor(Math.random() * COLS),
      r: Math.floor(Math.random() * ROWS),
      t0: t, life: 0.3 + Math.random() * 0.5,
      glyph: PH[Math.floor(Math.random() * PH.length)],
    });
  }
}

function drawHeavyStatic(t) {
  for (let i = 0; i < 18; i++) {
    const c = Math.floor(Math.random() * COLS);
    const r = Math.floor(Math.random() * ROWS);
    if (SCH[r] && SCH[r][c]) continue;
    const ch = LET[Math.floor(Math.random() * LET.length)];
    ctx.fillStyle = grey(0.10 + Math.random() * 0.15);
    ctx.fillText(ch, c * CW, r * LH);
  }
}

function drawPllPhase(t) {
  const conv = clamp((t - initT) / 6, 0, 1);
  const cx = Math.floor(COLS / 2);
  const cy = Math.floor((VCC_ROW + GND_ROW) / 2);
  const r0 = 6;
  ctx.fillStyle = grey(0.20);
  for (let i = 0; i < 24; i++) {
    const ang = (i / 24) * Math.PI * 2;
    const cc = Math.floor(cx + Math.cos(ang) * r0 * 2);
    const rr = Math.floor(cy + Math.sin(ang) * r0);
    if (cc < 0 || cc >= COLS || rr < 0 || rr >= ROWS) continue;
    if (SCH[rr] && SCH[rr][cc]) continue;
    ctx.fillText('·', cc * CW, rr * LH);
  }
  // pointer
  const ang = (1 - conv) * Math.PI * 1.5 + t * 0.4 * (1 - conv);
  for (let k = 1; k < r0 * 2; k++) {
    const cc = Math.floor(cx + Math.cos(ang) * k);
    const rr = Math.floor(cy + Math.sin(ang) * (k * 0.5));
    if (cc < 0 || cc >= COLS || rr < 0 || rr >= ROWS) continue;
    if (SCH[rr] && SCH[rr][cc]) continue;
    ctx.fillStyle = grey(0.45 + 0.45 * conv);
    ctx.fillText(conv > 0.95 ? '●' : '·', cc * CW, rr * LH);
  }
}

function drawAmEnvelope(t) {
  const r = Math.floor((VCC_ROW + GND_ROW) / 2) - 8;
  if (r < 1 || r >= ROWS) return;
  for (let c = 0; c < COLS; c++) {
    const phi = c * 0.18;
    const env = 1 + 0.6 * Math.cos(t * 0.8 + phi * 0.3);
    const car = Math.cos(t * 6 + phi);
    const v = env * (car + 1) / 4;
    if (v < 0.25) continue;
    const a = 0.10 * v;
    if (SCH[r] && SCH[r][c]) continue;
    ctx.fillStyle = grey(a);
    ctx.fillText('∿', c * CW, r * LH);
  }
}

// ─── schematic render ─────────────────────────────────────────────

function drawSchematic(t) {
  for (let r = 0; r < ROWS; r++) {
    const row = SCH[r];
    for (let c = 0; c < COLS; c++) {
      const sc = row[c];
      if (!sc) continue;

      let ch = sc.ch;
      let baseA = 0.22;
      let pulseScale = 0.55;

      switch (sc.kind) {
        case 'verse': {
          const e = energyAt(c);
          if (e >= 0.5) { ch = sc.ch; baseA = 0.92; pulseScale = 0.12; }
          else          { ch = '─';    baseA = 0.22 + 0.40 * e; pulseScale = 0.60; }
          break;
        }
        case 'verse-space':  ch = '─'; baseA = 0.22 + 0.22 * energyAt(c); break;
        case 'comp':         baseA = 0.55; pulseScale = 0.45; break;
        case 'rail':         baseA = 0.24; pulseScale = 0.60; break;
        case 'junction':     baseA = 0.40; pulseScale = 0.45; break;
        case 'bajante':      baseA = 0.24; break;
        case 'cross':        baseA = 0.42; pulseScale = 0.50; break;
        case 'cross-bajante':baseA = 0.32; break;
        case 'vcc':          baseA = 0.34; break;
        case 'gnd':          baseA = 0.34; break;
        case 'vbus':         baseA = 0.24; break;
        case 'via':          baseA = 0.65; break;
        case 'bus-junction': baseA = 0.42; break;
        case 'label':        baseA = 0.62; break;
      }

      let pulseBoost = 0;
      if (sc.kind === 'vcc')                              pulseBoost = busPulseH(c, t, 0) * 0.55;
      else if (sc.kind === 'gnd')                         pulseBoost = busPulseH(c, t, 1) * 0.55;
      else if (sc.kind === 'vbus' || sc.kind === 'cross-bajante' || sc.kind === 'cross') {
        pulseBoost = busPulseV(r, t, sc.busIdx ?? 0) * 0.45;
        if (sc.kind === 'cross' && sc.lineIdx !== undefined) {
          pulseBoost = Math.max(pulseBoost, pulseAt(c, sc.lineIdx, t) * 0.50);
        }
      }
      else if (sc.kind === 'bajante')                     pulseBoost = busPulseV(r, t, 9) * 0.35;
      else if (sc.kind === 'via' || sc.kind === 'bus-junction')
        pulseBoost = Math.max(busPulseH(c, t, r === VCC_ROW ? 0 : 1), busPulseV(r, t, VBUSES.indexOf(c))) * 0.35;
      else if (sc.lineIdx !== undefined)                  pulseBoost = pulseAt(c, sc.lineIdx, t) * pulseScale;

      let a = baseA + pulseBoost;
      if (sc.kind === 'verse' && energyAt(c) >= 0.5) {
        a = modeModulate(sc.ch, a, sc.lineIdx, t);
      }
      if (mx >= 0) {
        const d = Math.hypot((c - mx) * 0.7, (r - my));
        if (d < 7) a += (1 - d/7) * 0.22;
      }
      if (a < 0.03) continue;
      ctx.fillStyle = grey(Math.min(1, a));
      ctx.fillText(ch, c * CW, r * LH);
    }
  }
}

// ─── equations ────────────────────────────────────────────────────

function drawEquations(t) {
  for (const eq of equationLabels) {
    const age = t - eq.t0;
    if (age < 0) continue;
    if (age > eq.life) {
      const spot = findFreeSpot(eq.text.length);
      if (spot) { eq.c = spot.c; eq.r = spot.r; }
      eq.t0 = t + Math.random() * 2;
      eq.life = 5 + Math.random() * 5;
      continue;
    }
    let alpha;
    if (age < 0.7)            alpha = age / 0.7;
    else if (age > eq.life-1) alpha = Math.max(0, (eq.life - age));
    else                       alpha = 1;
    alpha *= 0.5;
    ctx.fillStyle = grey(alpha);
    for (let k = 0; k < eq.text.length; k++) {
      const cc = eq.c + k;
      if (cc < 0 || cc >= COLS) continue;
      ctx.fillText(eq.text[k], cc * CW, eq.r * LH);
    }
  }
}

// ─── sparks ──────────────────────────────────────────────────────

const SPARK_CHARS = '*+×•·';

function drawSparks(t) {
  if (Math.random() < 0.035) {
    sparkEvents.push({
      c: Math.floor(Math.random() * COLS),
      r: Math.floor(Math.random() * ROWS),
      t0: t,
      life: 0.18 + Math.random() * 0.35,
    });
  }
  const kept = [];
  for (const sp of sparkEvents) {
    const age = t - sp.t0;
    if (age > sp.life) continue;
    const a = 1 - age / sp.life;
    ctx.fillStyle = grey(a * 0.85);
    const ch = sp.glyph || SPARK_CHARS[Math.floor(t * 60 + sp.c + sp.r) % SPARK_CHARS.length];
    if (sp.c >= 0 && sp.c < COLS && sp.r >= 0 && sp.r < ROWS) {
      ctx.fillText(ch, sp.c * CW, sp.r * LH);
    }
    kept.push(sp);
  }
  sparkEvents = kept;
}

// ─── HUD helpers ─────────────────────────────────────────────────

function clearRect(c0, r0, w, h) {
  ctx.fillStyle = '#000';
  ctx.fillRect(c0 * CW, r0 * LH, w * CW, h * LH);
}

function drawBox(c0, r0, w, h, alpha) {
  ctx.fillStyle = grey(alpha);
  ctx.fillText('┌' + '─'.repeat(w - 2) + '┐', c0 * CW, r0 * LH);
  ctx.fillText('└' + '─'.repeat(w - 2) + '┘', c0 * CW, (r0 + h - 1) * LH);
  for (let r = r0 + 1; r < r0 + h - 1; r++) {
    ctx.fillText('│', c0 * CW, r * LH);
    ctx.fillText('│', (c0 + w - 1) * CW, r * LH);
  }
}

// ─── HUD: oscilloscope ───────────────────────────────────────────

const SCOPE_W = 34, SCOPE_H = 7;

function drawOscilloscope(t) {
  const ox = COLS - SCOPE_W - 2;
  const oy = ROWS - SCOPE_H - 2;
  if (ox < 2 || oy < 2) return;
  clearRect(ox, oy, SCOPE_W, SCOPE_H);
  drawBox(ox, oy, SCOPE_W, SCOPE_H, 0.42);

  ctx.fillStyle = grey(0.45);
  ctx.fillText('scope', (ox + 2) * CW, oy * LH);

  const innerW = SCOPE_W - 4;
  const innerH = SCOPE_H - 3;
  const midR = oy + 1 + Math.floor(innerH / 2);
  ctx.fillStyle = grey(0.15);
  for (let i = 0; i < innerW; i++) ctx.fillText('·', (ox + 2 + i) * CW, midR * LH);

  ctx.fillStyle = grey(0.78);
  for (let i = 0; i < innerW; i++) {
    const x = i / innerW;
    const ph = t * modeCfg.pulseSpeed * 0.5 - x * 6.28 * 2;
    let y = modeCfg.square ? (Math.sin(ph) > 0 ? -1 : 1) : -Math.sin(ph);
    if (mode === 'amp')        y *= (0.3 + (i / innerW) * 0.7);
    if (mode === 'filter')     y *= 0.5;
    if (mode === 'silence')    y *= 0.1;
    if (mode === 'rect')       y = Math.abs(y) - 0.5;
    if (mode === 'integrator') y = -1 + 2 * x;
    if (mode === 'modAM')      y *= (0.5 + 0.5 * Math.cos(t * 0.8 + x * 6));
    if (mode === 'noise')      y = (Math.random() * 2 - 1) * 0.7;
    const yIdx = Math.max(0, Math.min(innerH - 1, Math.floor((y + 1) / 2 * (innerH - 1))));
    ctx.fillText('•', (ox + 2 + i) * CW, (oy + 1 + yIdx) * LH);
  }

  ctx.fillStyle = grey(0.40);
  const f = (modeCfg.pulseSpeed * 100).toFixed(1);
  ctx.fillText(`${f} Hz`, (ox + SCOPE_W - 9) * CW, (oy + SCOPE_H - 1) * LH);
}

// ─── HUD: probe panel ────────────────────────────────────────────

const PROBE_W = 22, PROBE_H = 7;

function drawProbePanel(t) {
  const ox = COLS - PROBE_W - 2;
  const oy = 4;
  if (ox < 2 || oy + PROBE_H >= ROWS) return;
  clearRect(ox, oy, PROBE_W, PROBE_H);
  drawBox(ox, oy, PROBE_W, PROBE_H, 0.42);

  ctx.fillStyle = grey(0.45);
  ctx.fillText('probe', (ox + 2) * CW, oy * LH);

  const sampC = mx >= 0 ? mx : Math.floor(COLS / 2);
  const sampR = my >= 0 ? my : Math.floor(ROWS / 2);
  const v = noiseValue(sampC, sampR, t);
  const V = (v * 12.34).toFixed(2);
  const I = (v * 0.45 + 0.05).toFixed(2);
  const Z = (10 + v * 8).toFixed(1);
  const phi = Math.floor(v * 360 - 180);

  ctx.fillStyle = grey(0.70);
  ctx.fillText(`V = ${V} mV`, (ox + 2) * CW, (oy + 1) * LH);
  ctx.fillText(`I = ${I} mA`, (ox + 2) * CW, (oy + 2) * LH);
  ctx.fillText(`Z = ${Z} kΩ`, (ox + 2) * CW, (oy + 3) * LH);
  ctx.fillText(`φ = ${phi}°`,  (ox + 2) * CW, (oy + 4) * LH);
  ctx.fillStyle = grey(0.35);
  ctx.fillText(`[ ${mode} ]`, (ox + 2) * CW, (oy + 5) * LH);
}

// ─── HUD: spectrum ───────────────────────────────────────────────

const SPEC_BARS = 5;
const SPEC_H    = 14;
function drawSpectrum(t) {
  const ox = 2;
  const oy = 5;
  if (oy + SPEC_H >= ROWS - 6) return;
  clearRect(ox - 1, oy - 1, SPEC_BARS * 2 + 2, SPEC_H + 2);

  ctx.fillStyle = grey(0.30);
  ctx.fillText('spec', ox * CW, (oy - 1) * LH);

  for (let i = 0; i < SPEC_BARS; i++) {
    const a = (Math.sin(t * (1 + i * 0.55) + i * 1.3) + 1) / 2;
    const b = (Math.cos(t * (0.7 + i * 0.4) + i * 2.1) + 1) / 2;
    const h = Math.max(1, Math.floor((a * 0.65 + b * 0.35) * SPEC_H));
    for (let j = 0; j < SPEC_H; j++) {
      const rr = oy + SPEC_H - 1 - j;
      const cc = ox + i * 2;
      if (j < h) {
        const alpha = 0.20 + 0.45 * (j / h);
        ctx.fillStyle = grey(alpha);
        ctx.fillText('█', cc * CW, rr * LH);
      } else {
        ctx.fillStyle = grey(0.08);
        ctx.fillText('░', cc * CW, rr * LH);
      }
    }
  }
}

// ─── HUD: lissajous (mid-left, debajo del spectrum) ──────────────

const LISS_W = 14, LISS_H = 8;
function drawLissajous(t) {
  const ox = 2;
  const oy = 5 + SPEC_H + 2;
  if (oy + LISS_H >= ROWS - 8) return;
  clearRect(ox, oy, LISS_W, LISS_H);
  drawBox(ox, oy, LISS_W, LISS_H, 0.38);
  ctx.fillStyle = grey(0.42);
  ctx.fillText('liss', (ox + 2) * CW, oy * LH);

  const innerW = LISS_W - 4;
  const innerH = LISS_H - 3;
  const cx = ox + 2 + innerW / 2;
  const cy = oy + 1 + innerH / 2;
  const [a, b, phi] = modeCfg.liss || [1, 1, 0];

  ctx.fillStyle = grey(0.55);
  const steps = 60;
  for (let i = 0; i < steps; i++) {
    const u = (i / steps) * Math.PI * 2 + t * 0.6;
    const x = Math.cos(a * u);
    const y = Math.sin(b * u + phi);
    const cc = Math.floor(cx + x * innerW / 2);
    const rr = Math.floor(cy + y * innerH / 2);
    if (cc < 0 || cc >= COLS || rr < 0 || rr >= ROWS) continue;
    const alpha = 0.30 + 0.40 * (i / steps);
    ctx.fillStyle = grey(alpha);
    ctx.fillText('·', cc * CW, rr * LH);
  }
}

// ─── HUD: trace log (bottom-left) ────────────────────────────────

const TRACE_W = 40, TRACE_H = 8;
function pushTrace(t) {
  const sec = Math.floor(t);
  if (sec === lastTraceSecond) return;
  lastTraceSecond = sec;
  const msgs = TRACE_MESSAGES[mode] || ['signal','flux','vibe','tbd'];
  const msg = msgs[sec % msgs.length];
  traceLog.push(`[${t.toFixed(1)}] ${msg}`);
  if (traceLog.length > TRACE_H - 3) traceLog.shift();
}

function drawTraceLog(t) {
  const ox = 2;
  const oy = ROWS - TRACE_H - 2;
  if (ox + TRACE_W >= COLS - 4 || oy < 5 + SPEC_H + 2 + LISS_H + 1) return;
  pushTrace(t);
  clearRect(ox, oy, TRACE_W, TRACE_H);
  drawBox(ox, oy, TRACE_W, TRACE_H, 0.40);
  ctx.fillStyle = grey(0.45);
  ctx.fillText('trace', (ox + 2) * CW, oy * LH);
  for (let i = 0; i < traceLog.length; i++) {
    const fade = 0.35 + 0.50 * (i / Math.max(1, traceLog.length - 1));
    ctx.fillStyle = grey(fade);
    const txt = traceLog[i].slice(0, TRACE_W - 4);
    ctx.fillText(txt, (ox + 2) * CW, (oy + 1 + i) * LH);
  }
}

// ─── cursor probe overlay ────────────────────────────────────────

const HEIGHT_CHARS = '▁▂▃▄▅▆▇█';
function drawCursorProbe(t) {
  if (mx < 0) return;
  let label;
  const sc = (my >= 0 && my < ROWS && mx >= 0 && mx < COLS) ? SCH[my][mx] : null;
  if (sc && sc.kind === 'comp')      label = `${sc.type} = ${COMP_VALUES[sc.type]}`;
  else if (sc && sc.kind === 'via')  label = `via ●`;
  else if (sc && sc.kind === 'vcc')  label = `Vcc = +5.00 V`;
  else if (sc && sc.kind === 'gnd')  label = `GND = 0.00 V`;
  else if (sc && sc.kind === 'verse')label = `node "${sc.ch}"`;
  else {
    const v = noiseValue(mx, my, t);
    label = `${(v * 12.34).toFixed(2)} mV`;
  }

  ctx.fillStyle = grey(0.92);
  ctx.fillText('┼', mx * CW, my * LH);
  ctx.fillStyle = grey(0.68);
  ctx.fillText(label, (mx + 2) * CW, Math.max(0, my - 1) * LH);

  probeHistory.push(noiseValue(mx, my, t));
  if (probeHistory.length > 22) probeHistory.shift();
  const trc = (my + 1 < ROWS - 1) ? my + 1 : my - 2;
  ctx.fillStyle = grey(0.55);
  for (let i = 0; i < probeHistory.length; i++) {
    const cc = mx + 2 + i;
    if (cc < 0 || cc >= COLS) continue;
    const idx = Math.min(7, Math.floor(probeHistory[i] * 8));
    ctx.fillText(HEIGHT_CHARS[idx], cc * CW, trc * LH);
  }
}

// ─── status ──────────────────────────────────────────────────────

function drawStatus(t) {
  ctx.fillStyle = grey(0.40);
  const fps = (1 / Math.max(0.001, lastDt)).toFixed(0);
  const eq  = (pieza.equations && pieza.equations[0]) || '';
  const line = `[ ${mode.padEnd(11)} ]  ${eq.padEnd(20)}  t=${t.toFixed(1)}s  frame=${frame}  ${fps}fps   ·   click=spark · space=skip`;
  ctx.fillText(line.slice(0, COLS - 2), CW, (ROWS - 2) * LH);
}

// ─── main loop ───────────────────────────────────────────────────

function draw(dt, t) {
  const endX = boxR + 1;
  if (phase === 'reveal') {
    waveX += WAVE_SPEED * dt;
    if (waveX >= endX) { phase = 'hold'; holdT = 0; }
  } else if (phase === 'hold') {
    holdT += dt;
    if (holdT >= HOLD_DUR) { phase = 'hide'; hideX = boxL - 1; }
  } else {
    hideX += HIDE_SPEED * dt;
    if (hideX >= endX) init();
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.font = `${FS}px 'Courier New', monospace`;
  ctx.textBaseline = 'top';

  drawSubstrate(t);
  drawNoise(t);
  drawModeOverlay(t);
  drawSchematic(t);
  drawEquations(t);
  drawSparks(t);
  drawSpectrum(t);
  drawLissajous(t);
  drawTraceLog(t);
  drawOscilloscope(t);
  drawProbePanel(t);
  drawCursorProbe(t);
  drawStatus(t);
}

let lastTs = null;
function loop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  lastDt = dt;
  T += dt;
  frame++;
  draw(dt, T);
  requestAnimationFrame(loop);
}

resize();
window.addEventListener('resize', resize);
init();
requestAnimationFrame(loop);

document.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') init(); });
</script>
</body>
