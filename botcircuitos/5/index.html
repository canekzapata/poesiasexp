<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>circuito</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const FS = 14;
ctx.font = `${FS}px 'Courier New', monospace`;
const CW = ctx.measureText('M').width;
const LH = FS * 1.65;

let W, H, COLS, ROWS;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  COLS = Math.floor(W / CW) + 1;
  ROWS = Math.floor(H / LH) + 1;
}
resize();
window.addEventListener('resize', resize);

const PIEZAS = [
  [
    "debajo del pino",
    "pregunto al silencio",
    "",
    "Vout = 0V",
  ],
  [
    "el capacitor guarda",
    "lo que el rio olvida",
    "",
    "──┤├──",
    "",
    "C = Q/V",
  ],
  [
    "en la resonancia",
    "todo coincide",
    "",
    "f0 = 1 / 2π√LC",
  ],
  [
    "el transistor amplifica",
    "tambien el silencio",
    "",
    "Ic = β · Ib",
  ],
  [
    "libre de ruido",
    "me construi un filtro",
    "",
    "τ = RC",
  ],
  [
    "nadie escucha el clock",
    "",
    "■ □ ■ □ ■ □",
    "",
    "32 768 Hz",
  ],
];

let pieza, maxLen, startCol, startRow;
let waveX = 0, hideX = 0, phase = 'reveal', holdT = 0;

const WAVE_SPEED = 3.5, HIDE_SPEED = 7, HOLD_DUR = 5.5, FADE_COLS = 5;

function init() {
  pieza    = PIEZAS[Math.random() * PIEZAS.length | 0];
  maxLen   = Math.max(...pieza.map(l => l.length));
  startCol = Math.floor((COLS - maxLen) / 2);
  startRow = Math.floor((ROWS - pieza.length) / 2);
  waveX    = startCol - 2;
  hideX    = startCol - 2;
  phase    = 'reveal';
  holdT    = 0;
}

function grey(v) {
  const b = Math.round(Math.max(0, Math.min(1, v)) * 255);
  return `rgb(${b},${b},${b})`;
}

function drawBackground(frame) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const s = Math.sin(c * 0.27 + r * 0.44 + frame * 0.014)
              * Math.cos(c * 0.12 - r * 0.19 + frame * 0.007);
      if (s > 0.80) {
        const ch = ((c * 3 + r * 7) % 4) === 0 ? '.' : '·';
        ctx.fillStyle = grey(0.10 + 0.05 * s);
        ctx.fillText(ch, c * CW, r * LH);
      }
    }
  }
}

function drawPoema() {
  for (let r = 0; r < pieza.length; r++) {
    const line = pieza[r];
    for (let c = 0; c < line.length; c++) {
      const ch = line[c];
      if (ch === ' ') continue;
      const gc = startCol + c;
      const x  = gc * CW;
      const y  = (startRow + r) * LH;
      let alpha = 0;
      if (phase === 'reveal') {
        const d = waveX - gc;
        if (d < 0) continue;
        alpha = d >= FADE_COLS ? 0.82 : 0.82 * (d / FADE_COLS);
      } else if (phase === 'hold') {
        alpha = 0.82;
      } else {
        const d = gc - hideX;
        if (d < 0) continue;
        alpha = d >= FADE_COLS ? 0.82 : 0.82 * (d / FADE_COLS);
      }
      ctx.fillStyle = grey(alpha);
      ctx.fillText(ch, x, y);
    }
  }
}

function draw(dt, frame) {
  const endCol = startCol + maxLen + 2;
  if (phase === 'reveal') {
    waveX += WAVE_SPEED * dt;
    if (waveX >= endCol) { phase = 'hold'; holdT = 0; }
  } else if (phase === 'hold') {
    holdT += dt;
    if (holdT >= HOLD_DUR) { phase = 'hide'; hideX = startCol - 2; }
  } else {
    hideX += HIDE_SPEED * dt;
    if (hideX >= endCol) init();
  }
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.font = `${FS}px 'Courier New', monospace`;
  ctx.textBaseline = 'top';
  drawBackground(frame);
  drawPoema();
}

let lastTs = null, frame = 0;
function loop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  frame++;
  draw(dt, frame);
  requestAnimationFrame(loop);
}

init();
requestAnimationFrame(loop);

document.addEventListener('click',   init);
document.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'Enter') init(); });
</script>
</body>
</html>
