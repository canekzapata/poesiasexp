    <script id="fxhash-snippet">
      //---- do not edit the following code (you can indent as you wish)
      let alphabet = "123456789abcdefghijkmnopqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ"
      var fxhash = "oo" + Array(49).fill(0).map(_=>alphabet[(Math.random()*alphabet.length)|0]).join('')
      let b58dec = (str) => str.split('').reduce((p,c,i) => p + alphabet.indexOf(c) * (Math.pow(alphabet.length, str.length-i-1)), 0)
      let fxhashTrunc = fxhash.slice(2)
      let regex = new RegExp(".{" + ((fxhashTrunc.length/4)|0) + "}", 'g')
      let hashes = fxhashTrunc.match(regex).map(h => b58dec(h))
      let sfc32 = (a, b, c, d) => {
        return () => {
          a |= 0; b |= 0; c |= 0; d |= 0
          var t = (a + b | 0) + d | 0
          d = d + 1 | 0
          a = b ^ b >>> 9
          b = c + (c << 3) | 0
          c = c << 21 | c >>> 11
          c = c + t | 0
          return (t >>> 0) / 4294967296
        }
      }
      var fxrand = sfc32(...hashes)
      //---- /do not edit the following code
    </script>

    <style>
    :root {
    --max-hue: 0;
}

body {

}
    body::before {
      content: "";
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: -1; /* Asegura que el pseudo-elemento esté detrás del contenido del body */
      background-size: cover;
      background-position: center;
      font-family: "Px437_IBM_EGA_9x14";
  }
  #textoGenerado a {
      text-decoration: none;
      color: inherit; /* Esto hará que el color del enlace sea el mismo que el del texto circundante */
      cursor: pointer;

  }
#fondo {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    z-index: -1; /* Asegura que el contenedor esté detrás del contenido */
    background-size: cover;
    background-position: center;
}
    #textoGenerado {
      position: absolute;
   bottom: 50%;
   width: 92%;
   padding: 2%;
   margin: 2%;
   margin-bottom: 2%;
   font-family: "Px437_DOS-V_re_PRC19";

   background-color: rgba(0,0,0,0.0);
      color: rgba(0,250,102,1);
        text-shadow: 3px 3px 7px black;
        font-size: 66px; /* Tamaño inicial, puedes ajustarlo según tus necesidades */
        transition: font-size 0.3s ease; /* Animación suave al cambiar el tamaño de la fuente */
    }
    /* Animación de 0 a 360 grados */
    @keyframes hueRotateFull {
        0% {
            filter: hue-rotate(0deg);
        }
        100% {
            filter: hue-rotate(360deg);
        }
    }

    /* Animación a un grado máximo y luego regreso */
    @keyframes hueRotateMaxAndBack {
      0%, {
          filter: hue-rotate(0deg);
      }
      50% {
          filter: hue-rotate(var(--max-rotation));
      }
       100%
       {
           filter: hue-rotate(0deg);
       }
  }

}
