<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>El archivo no recuerda</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="machine" class="machine">
    <canvas id="field"></canvas><div class="error"></div><div class="orbit"><i></i><i></i><i></i></div>
    <header><strong>EL ARCHIVO NO RECUERDA HABER SIDO LEÍDO</strong><span id="status"></span><em id="clock"></em></header>
    <section class="title"><b id="number"></b><h1 id="title"></h1><p id="subtitle"></p></section>
    <section id="swarm" class="swarm" aria-label="Lectura no lineal"></section>
    <svg id="link" viewBox="0 0 100 100" preserveAspectRatio="none"><path></path><text x="50" y="50" text-anchor="middle"></text></svg>
    <aside><b>NO LEER DE ARRIBA ABAJO</b><span>clic texto: mutar / conectar</span><span>rueda: comprimir tiempo</span><span>C: otra paleta · R: recombinar</span><span>N: sabotear secuencia</span><span>SPACE: congelar proceso</span></aside>
    <nav id="nav"></nav>
    <footer><button id="pause">COMPRIMIR</button><button id="next">SIGUIENTE ACCIDENTE</button><span id="meta"></span><strong id="ticker"></strong></footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
