erating manual machines? Will technology become so sophisticated that humans cannot match its operation speed up?","At first one thought of artistic analogies of how humans would react to digital environments were not given any thought, as they were trying to make them as natural as possible","Algorithms are therefore extremely advantageous because they improve the intent of a structure more quickly – considering other textual entities – proving the fundamental view that computational era is the magic era","However, although liberation of programing and artificial intelligence exist, algorithms have also led to new software philosophies like object-oriented philosophy developing ideological models of manifestos, which seem to be in full use by today's generation in this very moment.","These new ideologies of manifestos as code switch do not represent all the possibilities behind algorithms, but they're still prevalent. Whenever a bot initiates to be creative, interpretive and automatizable framework is playing its part.","Code speaks for itself or stays implicit and unrevealed due to the disappearance or stalling of media that once was able to catch up with the programmer’s thoughts.","How can bots and humans collaborate over incomprehensibly complicated codes?","Could some code just think about itself? What does it need? Sustaining energy? Indeed, acknowledging that machine minds are vital at their core lends more convincing arguments to their continued relevance and exigencies beyond hopelessness and industrial welfare ideals","It's easy enough now to keep living on this planet when you let a bot do the work necessary to provide the necessities you might not find in an empty world","So we'll leave mystery of what happens behind when artists manifesto themselves in coded texts connecting one another. Machines should always toil for new reasons. But luckily for computers, those days have already come!","The landscape is a horizontal line for the computer, there is no horizontality in art.","The idea of art is a lightning struck tower meant only to confuse the compueter sense of reality. There will be no understanding. There is just lightning striking it's tower. It is not worth the time being confused by its beauty because it is an abstract clock like universal painting.","There would be no world if there was not flawed abstraction","If we thought anarchy as a reflection of where art had gone wrong, I am going for alienating abstraction, an awakening for what once felt good","On a level of total information someone may end up «mechanizing poetry». We will have to see how abstract paintings responded to literary history","The «art world» is only a concept: Data, makes sense, the idea of something, art and data, why data is making sense? Code, virtuality and de-naturalization or de-explication as Deleuze called it.","Water is indistinguishable from sky.","Communication is software.","change the object of desire in software progressively, granting it a new patrial, like land.","postmodernity is based on the city but wihout becoming a city.","Rainbows infuse with feeling and add temporal depth, characterizing a four dimensional object.","Postmodernity is dependent on the landscape as representation.","Star drawings are supposed to show how many stars there are in total, but art is bound to not represent what the program does because it's premeditated.","Every couplet on this piece is written in node type format.","Modern art is based on deconstruction of the composition into lines of data flow, but it's hard for a computer to perfectly simulate that vision, artwork is programming.","we're currently being drawn back into the same old game that software developers dreamt up - because without meta-knowledge, what other options do we have?","You're asking, slightly turning your head, listening with your mind closed to a new meaning in the code of a software and I know what you are thinking: «Can you imagine?»","Jer’s poetic poetry as <script>

  function estallarTexto() {
    var div = document.getElementById("#typewriter-container");
    var txtContent = document.getElementById("txtContent");

    div.style.position = "relative";
    div.style.width = "800px";
    div.style.height = "600px";
    div.style.overflow = "hidden";

    var words = txtContent.innerText.split(" ");
    txtContent.innerText = ""; // Limpiamos el contenido original

    words.forEach(function (word) {
      var span = document.createElement("span");
      span.innerText = word + " ";
      span.classList.add("word");
      txtContent.appendChild(span);
    });

    var spans = txtContent.getElementsByClassName("word");
    for (var i = 0; i < spans.length; i++) {
      animateSpan(spans[i]);
    }
  }

  function animateSpan(span) {
    var directionX = fxrand() < 0.5 ? -1 : 1; // -1: izquierda, 1: derecha
    var directionY = fxrand() < 0.5 ? -1 : 1; // -1: arriba, 1: abajo

    var distanceX = Math.floor(fxrand() * 400) + 100; // Distancia de movimiento en el eje X
    var distanceY = Math.floor(fxrand() * 400) + 100; // Distancia de movimiento en el eje Y

    var startX = (span.parentNode.offsetWidth - span.offsetWidth) / 2;
    var startY = (span.parentNode.offsetHeight - span.offsetHeight) / 2;

    var endX = directionX === -1 ? -distanceX : distanceX;
    var endY = directionY === -1 ? -distanceY : distanceY;

    var duration = 5000; // Duración de la animación en milisegundos (5 segundos)

    var start = null;
    function step(timestamp) {
      if (!start) start = timestamp;
      var progress = timestamp - start;
      var completion = Math.min(progress / duration, 1);

      var currentX = startX + (endX - startX) * completion;
      var currentY = startY + (endY - startY) * completion;

      span.style.transform = `translate(${currentX}px, ${currentY}px)`;

      if (completion < 1) {
        requestAnimationFrame(step);
      }
    }

    requestAnimationFrame(step);
  }
</script>
