"If Jupiter had turned into a Star" is a small code-poem, compiled out of text
scraped from astronomy powerpoint lectures on binary star system formation. It
looks at our sun's twin, a star that (depending on who you speak to) is
utterly imaginary, never reached critical mass and remained the gas-giant
