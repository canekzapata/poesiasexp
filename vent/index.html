<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>vent — territorio y blueprint</title>
<!--
vent

una pieza generativa de texto abstracto en clave de mapa y blueprint,
en la linea grafica de the designers republic. dividida en tres:

  · campo    — la pantalla grande: arte abstracto con frases y conjuntos
               de caracteres unicode. usa las formas de fonts (rafagas de
               palabras en varias escalas, evolucion de color) y de
               sutileza / psfx (mosaicos de bloques en contenedores pulsantes)
  · territorio — un cuadro (~20%) en una esquina al azar: un creador de
               territorio, mapas y topologias en trama de caracteres
  · conector  — una franja (~30%) horizontal o vertical: reconecta la
               informacion del campo de otra forma, como diagrama de nodos

  clic: otra composicion

poesiasexp / canekzapata.net — 2026
-->

<link rel="preload" href="../sutileza/css/unscii-16-full.woff" as="font" crossorigin="anonymous">
<link rel="preload" href="../psfx/Px437_IBM_VGA_9x8-2x.ttf" as="font" crossorigin="anonymous">

<style>
/* ---- fuentes: se toman prestadas de las carpetas hermanas de poesiaexp ---- */
@font-face { font-family:'unscii';   src:url(../sutileza/css/unscii-16-full.woff); }
@font-face { font-family:'symbola';  src:url(../sutileza/css/Symbola.ttf); }
@font-face { font-family:'alpha';    src:url(../sutileza/css/ALPHA-Test.otf); }
@font-face { font-family:'tibet';    src:url(../sutileza/css/Jomolhari-xvVK.ttf); }
@font-face { font-family:'ever';     src:url(../sutileza/css/Web437_IBM_Model3x_Alt4.woff); }
@font-face { font-family:'unifont';  src:url(../paisajes/UNIFONT.TTF); }
@font-face { font-family:'egipcio';  src:url(../paisajes/NOTOSANSEGYPTIANHIEROGLYPHS-REGULAR.TTF); }
@font-face { font-family:'anatolio'; src:url(../paisajes/NOTOSANSANATOLIANHIEROGLYPHS-REGULAR.TTF); }
@font-face { font-family:'linearb';  src:url(../paisajes/NOTOSANSLINEARB-REGULAR.TTF); }
@font-face { font-family:'electro';  src:url(../paisajes/ELECTRONICS.TTF); }
@font-face { font-family:'vga';      src:url(../psfx/Px437_IBM_VGA_9x8-2x.ttf); }
@font-face { font-family:'wang';     src:url(../psfx/Px437_Wang_Pro_Mono.ttf); }
@font-face { font-family:'hplx';     src:url(../psfx/PxPlus_HP_100LX_6x8.ttf); }
@font-face { font-family:'phags';    src:url(../psfx/phagspa.ttf); }
@font-face { font-family:'sign';     src:url(../psfx/SuttonSignWritingLine.ttf); }

:root {
  /* el motor sobreescribe todo esto */
  --c0:#111;--c1:#111;--c2:#111;--c3:#111;--c4:#111;--c5:#111;--c6:#111;--c7:#111;
  --c8:#111;--c9:#111;--c10:#111;--c11:#111;--c12:#111;--c13:#111;--c14:#111;--c15:#111;
  --c16:#111;--c17:#111;--c18:#111;--c19:#111;--c20:#111;--c21:#111;--c22:#111;--c23:#111;
  --c24:#111;--c25:#111;--c26:#111;--c27:#111;--c28:#111;--c29:#111;--c30:#111;--c31:#111;
  --fondo:#04070c;    /* el substrato, casi negro */
  --fondo2:#070b12;
  --linea:#39566b;    /* la tinta del plano, el trazo azul */
  --tinta:#8fdcff;    /* acento primario */
  --tinta2:#ff5ea8;   /* acento complementario, magenta de registro */
  --tinta3:#ffd15e;   /* ambar de anotacion */
  --rejilla: 34px;    /* paso de la reticula */
  --deg:90deg; --deg2:45deg;
  --t1:1.4s; --t2:6s; --t3:3.7s; --t4:2s; --t5:12s;
  --shad:1px;
}

/* =================== esquemas de animacion =================== */
@keyframes derrame { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
@keyframes fondo {
  0%{background-color:var(--c0)} 12%{background-color:var(--c3)} 25%{background-color:var(--c7)}
  37%{background-color:var(--c11)} 50%{background-color:var(--c14)} 62%{background-color:var(--c18)}
  75%{background-color:var(--c22)} 87%{background-color:var(--c26)} 100%{background-color:var(--c30)} }
@keyframes tinta {
  0%{color:var(--c1)} 20%{color:var(--c5)} 38%{color:var(--c9)} 56%{color:var(--c13)}
  74%{color:var(--c17)} 89%{color:var(--c21)} 100%{color:var(--c25)} }
@keyframes sombras {
  0%{text-shadow:var(--shad) var(--shad) var(--c2)}
  25%{text-shadow:calc(var(--shad)*-1) var(--shad) var(--c8)}
  50%{text-shadow:var(--shad) calc(var(--shad)*-1) var(--c16)}
  75%{text-shadow:calc(var(--shad)*-1) calc(var(--shad)*-1) var(--c24)}
  100%{text-shadow:var(--shad) var(--shad) var(--c28)} }
@keyframes esquina { 0%{border-color:var(--c6)} 33%{border-color:var(--c15)} 66%{border-color:var(--c23)} 100%{border-color:var(--c31)} }
@keyframes latido { 0%,100%{opacity:.5} 50%{opacity:1} }
@keyframes barrido { 0%{transform:translateY(-100%)} 100%{transform:translateY(100%)} }

/* =================== pagina =================== */
html,body { margin:0; height:100%; background:var(--fondo); overflow:hidden; }
body {
  font-family:'unscii','unifont','symbola',sans-serif;
  color:var(--tinta);
  -webkit-font-smoothing:none;
  cursor:crosshair;
}

/* la reticula del plano: dos tramas de lineas + halo central */
#reticula {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    repeating-linear-gradient(0deg, transparent 0, transparent calc(var(--rejilla) - 1px), color-mix(in srgb, var(--linea) 22%, transparent) calc(var(--rejilla) - 1px), color-mix(in srgb, var(--linea) 22%, transparent) var(--rejilla)),
    repeating-linear-gradient(90deg, transparent 0, transparent calc(var(--rejilla) - 1px), color-mix(in srgb, var(--linea) 22%, transparent) calc(var(--rejilla) - 1px), color-mix(in srgb, var(--linea) 22%, transparent) var(--rejilla)),
    repeating-linear-gradient(0deg, transparent 0, transparent calc(var(--rejilla)*5 - 1px), color-mix(in srgb, var(--linea) 40%, transparent) calc(var(--rejilla)*5 - 1px), color-mix(in srgb, var(--linea) 40%, transparent) calc(var(--rejilla)*5)),
    repeating-linear-gradient(90deg, transparent 0, transparent calc(var(--rejilla)*5 - 1px), color-mix(in srgb, var(--linea) 40%, transparent) calc(var(--rejilla)*5 - 1px), color-mix(in srgb, var(--linea) 40%, transparent) calc(var(--rejilla)*5)),
    radial-gradient(ellipse at 50% 35%, color-mix(in srgb, var(--tinta) 8%, transparent), transparent 70%),
    var(--fondo);
}
/* linea de barrido tenue, blueprint vivo */
#reticula::after {
  content:""; position:absolute; left:0; right:0; height:40%;
  background:linear-gradient(180deg, transparent, color-mix(in srgb, var(--tinta) 6%, transparent), transparent);
  animation:barrido var(--t5) linear infinite; opacity:.5;
}

#escena { position:fixed; inset:0; z-index:1; }

/* =================== marco de registro global =================== */
#marco { position:fixed; inset:1.1vmin; z-index:6; pointer-events:none;
         border:1px solid color-mix(in srgb, var(--linea) 70%, transparent); }
.mira { position:fixed; z-index:7; color:var(--tinta2); font-family:'unscii',monospace;
        font-size:2.1vmin; line-height:1; pointer-events:none; opacity:.9; }
.mira.tl{ top:.5vmin; left:.5vmin } .mira.tr{ top:.5vmin; right:.5vmin }
.mira.bl{ bottom:.5vmin; left:.5vmin } .mira.br{ bottom:.5vmin; right:.5vmin }

/* rotulos tecnicos del plano, en las orillas */
.hud { position:fixed; z-index:7; font-family:'vga','wang',monospace; font-size:1.35vmin;
       letter-spacing:.08em; color:color-mix(in srgb, var(--tinta) 78%, transparent);
       pointer-events:none; white-space:pre; text-transform:uppercase; }
.hud .lo { color:color-mix(in srgb, var(--linea) 95%, var(--tinta)); }
.hud .hi { color:var(--tinta3); }
.hud .mg { color:var(--tinta2); }

/* =================== modulos (territorio + conector) =================== */
.modulo { position:absolute; z-index:4; box-sizing:border-box; overflow:hidden;
          background:color-mix(in srgb, var(--fondo2) 82%, transparent);
          border:1px solid color-mix(in srgb, var(--linea) 85%, var(--tinta));
          box-shadow:0 0 0 1px color-mix(in srgb, var(--fondo) 90%, transparent),
                     0 0 22px color-mix(in srgb, var(--fondo) 80%, transparent) inset; }
.modulo .cab { position:absolute; top:0; left:0; right:0; height:2.4vmin; z-index:3;
               display:flex; align-items:center; gap:.7em; padding:0 .6em;
               font-family:'vga','wang',monospace; font-size:1.25vmin; letter-spacing:.1em;
               text-transform:uppercase; color:var(--fondo);
               background:color-mix(in srgb, var(--tinta) 82%, var(--linea)); }
.modulo .cab .n { color:var(--fondo); font-weight:bold; }
.modulo .cab .d { margin-left:auto; color:color-mix(in srgb, var(--fondo) 80%, var(--tinta2)); }
/* corchetes de esquina del modulo */
.modulo .esq { position:absolute; width:1.5vmin; height:1.5vmin; z-index:3;
               border-color:var(--tinta2); }
.modulo .esq.a{ top:2.4vmin; left:0; border-top:2px solid; border-left:2px solid }
.modulo .esq.b{ top:2.4vmin; right:0; border-top:2px solid; border-right:2px solid }
.modulo .esq.c{ bottom:0; left:0; border-bottom:2px solid; border-left:2px solid }
.modulo .esq.d{ bottom:0; right:0; border-bottom:2px solid; border-right:2px solid }
.modulo .cuerpo { position:absolute; top:2.4vmin; left:0; right:0; bottom:0; overflow:hidden; }

/* ---- territorio: malla monoespaciada estricta ---- */
#territorio .mapa { font-family:'unscii','unifont',monospace; white-space:pre;
                    line-height:1; letter-spacing:0; position:absolute;
                    left:50%; top:50%; transform:translate(-50%,-50%); }
#territorio .glosa { position:absolute; font-family:'vga',monospace; font-size:1.15vmin;
                     letter-spacing:.06em; color:var(--tinta3); pointer-events:none;
                     text-shadow:0 0 3px var(--fondo); }
#territorio .marca { position:absolute; color:var(--tinta2); font-family:'unscii',monospace;
                     text-shadow:0 0 4px var(--fondo); }

/* ---- conector: svg de nodos ---- */
#conector svg { position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
#conector .nodo { position:absolute; transform:translate(-50%,-50%);
                  font-family:'unscii','symbola','egipcio',monospace; text-align:center;
                  line-height:1.05; text-shadow:0 0 5px var(--fondo); }
#conector .nodo .et { display:block; font-family:'vga',monospace; font-size:1.05vmin;
                      letter-spacing:.05em; color:var(--tinta3); text-transform:uppercase; }
#conector .nodo .pt { display:block; }

/* =================== campo: la pieza principal =================== */
#campo { position:absolute; inset:0; z-index:2; overflow:hidden; }
.pieza { position:absolute; transform:translate(-50%,-50%); white-space:pre-wrap;
         text-align:center; line-height:1.02; max-width:60vw; }
.pieza.mono { white-space:pre; font-family:'unscii','unifont',monospace; line-height:1; }

/* =================== contenedores de texto pulsante (sutileza) =================== */
h4,h5,h6,span,font,sub,sup { margin:0; overflow:hidden; }
h4 { display:inline-block; font-size:1.4em; animation:fondo var(--t4) ease infinite; }
h5 { display:inline-block; font-size:1.2em;
     background:linear-gradient(var(--deg),var(--c3),var(--c4),var(--c5),var(--c23),var(--c19));
     background-size:900% 900%; animation:derrame var(--t2) ease infinite; }
h6 { display:inline-block; font-size:.95em; text-shadow:var(--shad) var(--shad) var(--c12);
     animation:sombras var(--t4) ease infinite; }
span { display:inline-block;
       background:linear-gradient(var(--deg2),var(--c1),var(--c2),var(--c6),var(--c9),var(--c15));
       background-size:900% 900%; animation:derrame var(--t1) ease infinite; }
font { display:inline-block; animation:tinta var(--t1) ease infinite; }
sub,sup { display:inline-block; font-size:.62em; }
sub { animation:tinta var(--t2) ease infinite; }
sup { animation:sombras var(--t3) ease infinite; text-shadow:var(--shad) var(--shad) var(--c8); }

/* mascara de gradiente: la letra como ventana al color */
.mascara {
  background-image:linear-gradient(var(--deg2),var(--c19),var(--c16),var(--c10),var(--tinta),var(--c17));
  background-size:900% 900%; -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:transparent; animation:derrame var(--t2) ease infinite; }
</style>
</head>

<body>
  <div id="reticula"></div>
  <div id="escena"></div>
  <div id="marco"></div>

  <script src="../lexico.js"></script>
  <script src="vocabulario.js"></script>
  <script src="motor.js"></script>
</body>
</html>
