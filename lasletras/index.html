<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="La letra sostiene el techo — arquitecturas de signos deterministas. Token generativo para Verse.">
  <title>LA LETRA SOSTIENE EL TECHO</title>
  <style>
    @font-face {
      font-family: "Architecture Mono";
      src: url("fonts/Ac437_ApricotPortable.ttf") format("truetype");
      font-display: block;
    }
    @font-face {
      font-family: "Unicode Backup";
      src: url("fonts/Symbola.otf") format("opentype");
      font-display: block;
    }
    html, body {
      margin: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #10100f;
    }
    #lamina {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      shape-rendering: geometricPrecision;
      text-rendering: geometricPrecision;
    }
    #lamina text {
      -webkit-user-select: none;
      user-select: none;
    }
    .glyph, .carbon-glyph {
      font-family: "Architecture Mono", "Unicode Backup", "Courier New", monospace;
      white-space: pre;
    }
    .ficha {
      font-family: "Architecture Mono", "Courier New", monospace;
      letter-spacing: .06em;
    }
    .ficha.is-waiting {
      opacity: 0;
    }
  </style>
</head>
<body>
  <svg id="lamina" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet"
       role="img" aria-labelledby="tituloSvg descripcionSvg">
    <title id="tituloSvg">Arquitectura de signos generada por la semilla</title>
    <desc id="descripcionSvg">La computadora decide especie, forma, vacío, perspectiva, error y color.</desc>
  </svg>

  <script src="js/rng.js"></script>
  <script src="js/corpus.js"></script>
  <script src="js/architecture.js"></script>
  <script src="js/typewriter.js"></script>
  <script src="js/verse.js"></script>
</body>
</html>
