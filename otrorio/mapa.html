<!doctype html><html lang="es" style="--bg:#050505;--fg:#f8f7f1;--a:#ff4fa3;--b:#147bff;--c:#b7ff3c;--d:#ff652b"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>el mapa no contiene el territorio local</title><link rel="icon" href="favicon.svg" type="image/svg+xml"><link rel="stylesheet" href="css/base.css"><script defer src="manifest.js"></script></head><body style="overflow:hidden"><canvas id="map" style="position:fixed;inset:0;width:100%;height:100%"></canvas><nav style="position:fixed;left:8px;top:8px;z-index:2;display:flex;gap:3px"><a class="route" href="index.html">fuera del mapa</a><a class="route" href="afuera.html">afuera del afuera</a></nav><div id="nodes" style="position:fixed;inset:0;z-index:1"></div><script>addEventListener('load',function(){var m=window.LAB_MANIFEST;var c=document.getElementById('map');var x=c.getContext('2d');var d=Math.min(devicePixelRatio||1,2);c.width=innerWidth*d;c.height=innerHeight*d;x.scale(d,d);x.fillStyle='#050505';x.fillRect(0,0,innerWidth,innerHeight);var pts=m.pages.map(function(p,i){var a=i*2.39996;var r=30+Math.sqrt(i/m.pages.length)*Math.min(innerWidth,innerHeight)*.44;return{x:innerWidth/2+Math.cos(a)*r,y:innerHeight/2+Math.sin(a)*r,p:p}});x.globalAlpha=.58;pts.forEach(function(q){q.p.edges.forEach(function(id){var t=pts[Number(id)];if(!t)return;x.strokeStyle=q.p.palette[2];x.beginPath();x.moveTo(q.x,q.y);x.quadraticCurveTo(innerWidth/2,innerHeight/2,t.x,t.y);x.stroke()})});var layer=document.getElementById('nodes');pts.filter(function(q){return !q.p.hidden}).forEach(function(q){var a=document.createElement('a');a.className='route';a.href='paginas/'+q.p.id+'.html?seed='+encodeURIComponent(m.seed);a.textContent=q.p.id;a.title=q.p.topologyLabel;a.style.cssText='position:absolute;left:'+q.x+'px;top:'+q.y+'px;transform:translate(-50%,-50%);background:'+q.p.palette[0]+';color:'+q.p.palette[1]+';font-size:8px';layer.appendChild(a)})});</script></body></html>
